<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나스닥 100 기여도 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* 기본 스타일 및 다크모드 적용 */
        body { margin: 0; padding: 20px; background-color: #121212; color: white; font-family: sans-serif; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #aaaaaa; z-index: 1000; }
        
        /* 레이아웃 구성: 히트맵 구역 */
        #heatmap-container { width: 100%; height: 60vh; margin-bottom: 30px; }
        
        /* 하단 테이블 구역 스타일 */
        .table-section { max-width: 1200px; margin: 0 auto; padding-bottom: 50px; }
        .table-section h2 { font-size: 20px; margin-bottom: 15px; color: #e0e0e0; }
        
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #2d2d2d; }
        
        /* 정렬 가능한 헤더 스타일 */
        th { background-color: #2a2a2a; color: #aaaaaa; font-weight: bold; cursor: pointer; user-select: none; }
        th:hover { background-color: #333333; color: white; }
        th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; }
        
        /* 테이블 내부 숫자 색상 제어 */
        .pos { color: #00b853; font-weight: bold; }
        .neg { color: #f03b20; font-weight: bold; }
        tr:hover { background-color: #252525; }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>
    
    <div id="heatmap-container"></div>
    
    <div class="table-section">
        <h2>종목별 상세 데이터 정보</h2>
        <table id="stock-table">
            <thead>
                <tr>
                    <th onclick="sortTable('Ticker')">티커</th>
                    <th onclick="sortTable('Current Price ($)')">주가</th>
                    <th onclick="sortTable('Change (%)')">변동률</th>
                    <th onclick="sortTable('Market Cap ($)')">시가총액</th>
                    <th onclick="sortTable('Point Contribution')">지수 기여도</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script>
        const chartDom = document.getElementById('heatmap-container');
        const myChart = echarts.init(chartDom);
        
        // 🚨 본인의 GitHub 레이티스트 JSON Raw URL을 입력하세요.
        const dataUrl = 'https://raw.githubusercontent.com/GOATxx/NDX-Tracker/refs/heads/main/nasdaq-tracker/data/latest.json?token=GHSAT0AAAAAAD7ZNUEAJPF3RVUCGXPR6Y462RMBSLA';

        let globalStockData = []; // 정렬 기능을 위해 데이터를 전역 변수에 보관합니다.
        let currentSortColumn = '';
        let isAscending = true;

        // 💡 시가총액 단위를 가변적으로 변환하는 마법의 함수
        function formatMarketCap(mcap) {
            if (!mcap || mcap === 0) return 'N/A';
            if (mcap >= 1000000000000) {
                return `$${(mcap / 1000000000000).toFixed(2)} T`; // 1조 달러 이상은 Trillion
            } else {
                return `$${(mcap / 1000000000).toFixed(2)} B`;    // 1조 달러 미만은 Billion
            }
        }

        // 💡 변동률의 크기에 따라 색상의 농도(rgba 투명도)를 계산하는 함수
        function getHeatmapColor(changePercent, isPositive) {
            const absChange = Math.abs(changePercent);
            // 변동률이 4% 이상이면 가장 진한 색(투명도 1.0), 0%에 가까우면 연한 색(최소 투명도 0.25)
            let alpha = 0.25 + (absChange / 4) * 0.75;
            if (alpha > 1) alpha = 1.0; 

            return isPositive 
                ? `rgba(0, 184, 83, ${alpha})`  // 상승 초록색 계열
                : `rgba(240, 59, 32, ${alpha})`; // 하락 빨간색 계열
        }

        // 인터넷에서 데이터를 읽어오는 로직
        fetch(dataUrl)
            .then(response => {
                if (!response.ok) throw new Error('데이터 서빙 실패');
                return response.json();
            })
            .then(jsonData => {
                document.getElementById('loading').style.display = 'none';
                
                // 데이터 정제
                globalStockData = jsonData.filter(item => item['Point Contribution'] !== undefined && item['Point Contribution'] !== null);

                // 1. 히트맵 그리기
                renderHeatmap(globalStockData);
                
                // 2. 하단 표 그리기 (처음에는 기본 백엔드 정렬 순서대로)
                renderTable(globalStockData);
            })
            .catch(error => {
                document.getElementById('loading').innerText = '에러 발생: ' + error.message;
                console.error(error);
            });

        // 히트맵 렌더링 함수
        function renderHeatmap(data) {
            const treemapData = data.map(item => {
                const isPositive = item['Point Contribution'] >= 0;
                const change = item['Change (%)'];
                
                return {
                    name: item.Ticker,
                    value: Math.abs(item['Point Contribution']), 
                    itemStyle: {
                        color: getHeatmapColor(change, isPositive) // 💡 등락률 연동 색상 농도 적용
                    },
                    extraInfo: {
                        change: change,
                        point: item['Point Contribution'],
                        mcap: item['Market Cap ($)']
                    }
                };
            });

            const option = {
                tooltip: {
                    formatter: function (info) {
                        const d = info.data;
                        if (!d || !d.extraInfo) return '';
                        return `<div style="font-size: 16px; font-weight: bold; color:#121212;">${d.name}</div>
                                <span style="color:#121212;">등락률: ${d.extraInfo.change > 0 ? '+' : ''}${d.extraInfo.change}%</span><br/>
                                <span style="color:#121212;">기여도: ${d.extraInfo.point > 0 ? '+' : ''}${d.extraInfo.point} pt</span><br/>
                                <span style="color:#121212;">시가총액: ${formatMarketCap(d.extraInfo.mcap)}</span>`; // 💡 가변 단위 적용
                    }
                },
                series: [{
                    type: 'treemap',
                    data: treemapData,
                    roam: false, nodeClick: false, breadcrumb: { show: false },
                    label: {
                        show: true,
                        formatter: function(info) {
                            return `${info.name}\n${info.data.extraInfo.change > 0 ? '+' : ''}${info.data.extraInfo.change}%\n${info.data.extraInfo.point > 0 ? '+' : ''}${info.data.extraInfo.point}pt`;
                        },
                        fontSize: 13, color: '#ffffff'
                    },
                    itemStyle: { borderColor: '#121212', borderWidth: 2 }
                }]
            };
            myChart.setOption(option);
        }

        // 표(Table) 렌더링 함수
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // 기존 내용을 비웁니다.

            data.forEach(item => {
                const tr = document.createElement('tr');
                const isPos = item['Point Contribution'] >= 0;
                const changeClass = isPos ? 'pos' : 'neg';
                const sign = isPos ? '+' : '';

                tr.innerHTML = `
                    <td>${item.Ticker}</td>
                    <td>$${item['Current Price ($)'].toLocaleString()}</td>
                    <td class="${changeClass}">${sign}${item['Change (%)']}%</td>
                    <td>${formatMarketCap(item['Market Cap ($)'])}</td>
                    <td class="${changeClass}">${sign}${item['Point Contribution']} pt</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 💡 표 정렬 이벤트 처리 함수 (Vanilla JS 역동적 정렬)
        function sortTable(columnName) {
            if (currentSortColumn === columnName) {
                isAscending = !isAscending; // 동일한 열을 다시 누르면 오름차순/내림차순 토글
            } else {
                currentSortColumn = columnName;
                isAscending = true; // 새로운 열을 누르면 기본 오름차순 정렬
            }

            // 헤더 화살표 표시 업데이트
            const headers = document.querySelectorAll('th');
            headers.forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.innerText.replace(' ▲','').replace(' ▼','') === getDisplayName(columnName)) {
                    th.classList.add(isAscending ? 'sort-asc' : 'sort-desc');
                }
            });

            // 데이터 정렬 로직
            const sortedData = [...globalStockData].sort((a, b) => {
                let valA = a[columnName];
                let valB = b[columnName];

                // 문자열(티커) 정렬 대응
                if (typeof valA === 'string') {
                    return isAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
                
                // 숫자형 정렬 대응
                return isAscending ? valA - valB : valB - valA;
            });

            renderTable(sortedData); // 정렬된 데이터로 표만 다시 그리기
        }

        function getDisplayName(col) {
            if (col === 'Ticker') return '티커';
            if (col === 'Current Price ($)') return '주가';
            if (col === 'Change (%)') return '변동률';
            if (col === 'Market Cap ($)') return '시가총액';
            if (col === 'Point Contribution') return '지수 기여도';
            return '';
        }

        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
