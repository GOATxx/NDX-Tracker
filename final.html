<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 섹터 수급 대시보드</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #121212; color: white; font-family: sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #aaaaaa; z-index: 1000; }
        
        /* 탭 디자인 */
        .tab-container { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab-button { background: none; border: none; color: #aaaaaa; padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .tab-button:hover { color: white; background-color: #1e1e1e; }
        .tab-button.active { color: #00b853; border-bottom: 3px solid #00b853; }

        /* 섹션 공통 */
        .section-box { background-color: #1e1e1e; padding: 20px 25px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { font-size: 20px; margin-top: 0; margin-bottom: 15px; color: #e0e0e0; border-bottom: 1px solid #333; padding-bottom: 15px; }

        /* 컨트롤 패널 */
        .controls { background-color: #1a1a1a; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; display: flex; gap: 30px; align-items: center; justify-content: center; }
        .controls-group { display: flex; align-items: center; gap: 10px; }
        .controls label { font-weight: bold; color: #aaaaaa; }
        .controls select { padding: 8px 15px; background-color: #121212; color: #00b853; border: 1px solid #333; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; outline: none; }
        .controls select:hover { border-color: #00b853; }

        /* 테이블 디자인 */
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #2d2d2d; }
        th { background-color: #2a2a2a; color: #aaaaaa; font-weight: bold; }
        td:first-child, th:first-child { text-align: left; } /* 첫 열(종목명/섹터)은 왼쪽 정렬 */
        tr:hover { background-color: #252525; }
        
        /* 정렬 헤더 속성 */
        th.sortable { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        th.sortable:hover { background-color: #3a3a3a; color: #00b853; }

        /* 텍스트 컬러 속성 */
        .pos { color: #00b853; font-weight: bold; }
        .neg { color: #f03b20; font-weight: bold; }
        .neutral { color: #aaaaaa; font-weight: bold; }
        .bold-white { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div class="container">
        <!-- 네비게이션 탭 -->
        <div class="tab-container">
            <button class="tab-button" onclick="location.href='index.html'">◀ 나스닥 메인으로 돌아가기</button>
            <button class="tab-button active">🔥 ETF 섹터 정밀 수급</button>
        </div>

        <!-- 1. 윗부분: 모든 ETF 지표 요약 표 -->
        <div class="section-box" id="topSection">
            <h2>📊 전체 섹터 ETF 수급 지표 비교 (<span id="displayDateTop" class="pos">-</span> 기준)</h2>
            <table>
                <thead>
                    <tr>
                        <th>섹터 ETF</th>
                        <th>당일 종가 (증감)</th>
                        <th>자금 유출입 (Fund Flow)</th>
                        <th>수급 강도 (20D)</th>
                        <th>상대 거래량 (RVOL)</th>
                        <th>수급 확산도</th>
                        <th>상대 강도 (vs SPY)</th>
                    </tr>
                </thead>
                <tbody id="metricsTableBody">
                    <tr><td colspan="7">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 2. 컨트롤 패널 (상단 표 아래로 이동) -->
        <div class="controls">
            <div class="controls-group">
                <label>조회 일자:</label>
                <select id="dateSelect"><option>로딩 중...</option></select>
            </div>
            <div class="controls-group">
                <label>👇 상세 조회할 섹터 선택:</label>
                <select id="etfSelect">
                    <option value="XLK">XLK (기술주)</option>
                    <option value="XLF">XLF (금융주)</option>
                    <option value="XLV">XLV (헬스케어)</option>
                    <option value="XLE">XLE (에너지)</option>
                    <option value="XLI">XLI (산업재)</option>
                    <option value="XLC">XLC (커뮤니케이션)</option>
                    <option value="XLU">XLU (유틸리티)</option>
                    <option value="XLY">XLY (임의소비재)</option>
                    <option value="XLP">XLP (필수소비재)</option>
                    <option value="XLB">XLB (소재)</option>
                </select>
            </div>
        </div>

        <!-- 3. 아랫부분: 선택된 ETF 개별 종목 상세 -->
        <div class="section-box" id="bottomSection">
            <h2 style="border-bottom: none; padding-bottom: 0;">🏢 <span id="displayEtfBottom" class="pos">XLK</span> 개별 기업 상세 수급 내역</h2>
            <table style="margin-bottom: 0;">
                <thead>
                    <tr id="tickerTableHeadRow">
                        <th class="sortable" data-sort="ticker">티커 ⇅</th>
                        <th class="sortable" data-sort="price">당일 종가 ⇅</th>
                        <th class="sortable" data-sort="price_change_pct">전일비 증감률 ⇅</th>
                        <th class="sortable" data-sort="shares_current">보유 주식 수 ⇅</th>
                        <th class="sortable" data-sort="shares_change">주식 수 변동 ⇅</th>
                        <th class="sortable" data-sort="holdings_value">보유 가치 ⇅</th>
                        <th class="sortable" data-sort="dollar_flow">자금 유출입액 ($) ⇅</th>
                        <th class="sortable" data-sort="flow_ratio_pct">유입 비율 ⇅</th>
                        <th class="sortable" data-sort="weight_current">보유 비중 ⇅</th>
                    </tr>
                </thead>
                <tbody id="tickerTableBody">
                    <tr><td colspan="9">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let globalMetricsData = {};
        // 10개 섹터 ETF 목록으로 확장
        const ETF_LIST = ["XLK", "XLF", "XLV", "XLE", "XLI", "XLC", "XLU", "XLY", "XLP", "XLB"];

        // 정렬 상태 관련 변수
        let detailDataList = [];
        let defaultOrderList = [];
        let sortKey = null;
        let sortDirection = 'none'; // 'none' (기본값), 'desc' (내림차순), 'asc' (오름차순)

        // 색상 판별 헬퍼 함수
        function getColorClass(value) {
            const strVal = String(value);
            if (strVal.includes('+') || strVal.includes('유입')) return 'pos';
            if (strVal.includes('-') || strVal.includes('유출')) return 'neg';
            return 'neutral';
        }

        // 1. 페이지 로드 시 XL_metrics.json 가져오기
        fetch('./XL_metrics.json')
            .then(res => {
                if (!res.ok) throw new Error("메트릭스 파일 없음");
                return res.json();
            })
            .then(data => {
                globalMetricsData = data;
                document.getElementById('loading').style.display = 'none';
                
                // 날짜 목록은 데이터 일관성을 위해 XLK 기준으로 추출합니다
                updateDateDropdown('XLK'); 
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = '데이터를 불러오지 못했습니다.<br>파이썬 업데이트를 확인해주세요.';
                console.error(err);
            });

        // 2. 이벤트 리스너 설정
        document.getElementById('etfSelect').addEventListener('change', () => {
            updateDashboard(); // ETF만 변경되면 하단 상세 표만 다시 렌더링
        });
        document.getElementById('dateSelect').addEventListener('change', () => {
            updateDashboard(); // 날짜가 변경되면 상단 표, 하단 표 모두 다시 렌더링
        });

        // 헤더 클릭 정렬 이벤트 리스너
        document.querySelectorAll('#tickerTableHeadRow th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.getAttribute('data-sort');
                handleSort(key);
            });
        });

        // 3. 날짜 드롭다운 세팅
        function updateDateDropdown(baseEtf) {
            const dateSelect = document.getElementById('dateSelect');
            dateSelect.innerHTML = ""; 

            if (!globalMetricsData[baseEtf] || !globalMetricsData[baseEtf].history) {
                dateSelect.innerHTML = "<option>데이터 없음</option>";
                return;
            }

            const dates = Object.keys(globalMetricsData[baseEtf].history).sort().reverse();
            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = date;
                dateSelect.appendChild(option);
            });

            updateDashboard(); 
        }

        // 4. 화면 업데이트 (상단 전체 비교 표 + 하단 상세 표)
        function updateDashboard() {
            const date = document.getElementById('dateSelect').value;
            const selectedEtf = document.getElementById('etfSelect').value;

            if (date === "데이터 없음") return;

            // --- [1] 상단 표 (Metrics - 전체 ETF 비교) 업데이트 ---
            document.getElementById('displayDateTop').innerText = date;
            const metricsTbody = document.getElementById('metricsTableBody');
            metricsTbody.innerHTML = ""; // 기존 표 지우기

            ETF_LIST.forEach(etf => {
                const tr = document.createElement('tr');
                const etfData = globalMetricsData[etf]?.history[date];

                if (etfData) {
                    const priceClass = etfData.ETF_Price ? getColorClass(etfData.ETF_Price.display) : 'neutral';
                    const flowClass = getColorClass(etfData.Fund_Flow.display);
                    const rsClass = getColorClass(etfData.RS_Momentum.display);

                    tr.innerHTML = `
                        <td class="bold-white">${etf}</td>
                        <td class="${priceClass}">${etfData.ETF_Price ? etfData.ETF_Price.display : 'N/A'}</td>
                        <td class="${flowClass}">${etfData.Fund_Flow.display}</td>
                        <td>${etfData.Fund_Flow_Intensity_20D.display}</td>
                        <td>${etfData.Relative_Volume.display}</td>
                        <td class="pos">${etfData.Weighted_Breadth.display}</td>
                        <td class="${rsClass}">${etfData.RS_Momentum.display}</td>
                    `;
                } else {
                    tr.innerHTML = `<td class="bold-white">${etf}</td><td colspan="6" class="neutral">해당 일자 데이터 없음</td>`;
                }
                metricsTbody.appendChild(tr);
            });

            // --- [2] 하단 표 (Details - 선택된 ETF 개별 종목) 지연 로딩 ---
            document.getElementById('displayEtfBottom').innerText = selectedEtf;
            const detailUrl = `./details/${selectedEtf}/${date}.json`;
            const tickerTbody = document.getElementById('tickerTableBody');
            
            tickerTbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>상세 데이터를 불러오는 중...</td></tr>";

            // 조회 조건 변경 시 정렬 상태 초기화
            sortKey = null;
            sortDirection = 'none';

            fetch(detailUrl)
                .then(res => {
                    if (!res.ok) throw new Error("상세 파일 없음");
                    return res.json();
                })
                .then(detailData => {
                    const tickers = detailData.ticker_details;
                    detailDataList = [];

                    // 데이터 파싱 및 가공 (정렬을 위해 정밀 숫자 타입 확보)
                    for (const [ticker, info] of Object.entries(tickers)) {
                        const price = info.price || 0;
                        const shares_current = info.shares_current || 0;

                        // 보유 가치 수식 계산 (주식수 * 종가)
                        const holdings_value = shares_current * price;

                        // 유입 비율 수치 추출
                        let flow_ratio_pct = 0;
                        if (info.display && info.display.flow_ratio_pct) {
                            flow_ratio_pct = parseFloat(info.display.flow_ratio_pct.replace(/[^0-9.-]/g, '')) || 0;
                        }

                        detailDataList.push({
                            ticker: ticker,
                            price: price,
                            price_change_pct: info.price_change_pct || 0,
                            shares_current: shares_current,
                            shares_change: info.shares_change || 0,
                            holdings_value: holdings_value,
                            dollar_flow: info.dollar_flow || 0,
                            flow_ratio_pct: flow_ratio_pct,
                            weight_current: info.weight_current || 0,
                            display: info.display
                        });
                    }

                    // 기본 순서 백업 생성
                    defaultOrderList = [...detailDataList];

                    // 테이블 렌더링
                    applySortAndRender();
                })
                .catch(err => {
                    tickerTbody.innerHTML = `<tr><td colspan='9' class='neg' style='text-align:center;'>${selectedEtf}의 상세 데이터를 불러오지 못했습니다.</td></tr>`;
                    console.error(err);
                });
        }

        // 5. 정렬 핸들러 및 렌더링 로직
        function handleSort(key) {
            if (sortKey === key) {
                if (sortDirection === 'none') {
                    sortDirection = 'desc';
                } else if (sortDirection === 'desc') {
                    sortDirection = 'asc';
                } else {
                    sortDirection = 'none';
                    sortKey = null;
                }
            } else {
                sortKey = key;
                sortDirection = 'desc'; // 새로운 열 선택 시 내림차순 정렬 우선 수행
            }
            applySortAndRender();
        }

        function applySortAndRender() {
            let listToSort = [...detailDataList];

            if (sortKey && sortDirection !== 'none') {
                listToSort.sort((a, b) => {
                    let valA = a[sortKey];
                    let valB = b[sortKey];

                    if (sortKey === 'ticker') {
                        return sortDirection === 'asc' 
                            ? valA.localeCompare(valB) 
                            : valB.localeCompare(valA);
                    }
                    return sortDirection === 'asc' ? valA - valB : valB - valA;
                });
            } else {
                listToSort = [...defaultOrderList]; // 기본 정렬 복원
            }

            renderTickerTable(listToSort);
            updateHeaderArrows();
        }

        function renderTickerTable(list) {
            const tickerTbody = document.getElementById('tickerTableBody');
            tickerTbody.innerHTML = "";

            list.forEach(item => {
                const tr = document.createElement('tr');
                
                const pctClass = getColorClass(item.display.price_change_pct);
                const flowClass = getColorClass(item.display.dollar_flow);

                // 보유 비중 가공
                const weightVal = item.weight_current !== undefined ? item.weight_current.toFixed(2) + '%' : '0.00%';

                // 주식 수 변동 가공
                let sharesChangeText = '변동 없음';
                let sharesChangeClass = 'neutral';
                if (item.shares_change > 0) {
                    sharesChangeText = '+' + item.shares_change.toLocaleString() + '주';
                    sharesChangeClass = 'pos';
                } else if (item.shares_change < 0) {
                    sharesChangeText = item.shares_change.toLocaleString() + '주';
                    sharesChangeClass = 'neg';
                }

                tr.innerHTML = `
                    <td class="bold-white">${item.ticker}</td>
                    <td>${item.display.price}</td>
                    <td class="${pctClass}">${item.display.price_change_pct}</td>
                    <td class="neutral">${item.display.shares_current}</td>
                    <td class="${sharesChangeClass}">${sharesChangeText}</td>
                    <td class="neutral">${item.display.holdings_value || 'N/A'}</td>
                    <td class="${flowClass}">${item.display.dollar_flow}</td>
                    <td class="${flowClass}">${item.display.flow_ratio_pct}</td>
                    <td class="neutral">${weightVal}</td>
                `;
                tickerTbody.appendChild(tr);
            });
        }

        // 헤더 정렬 방향 표시 변경 함수
        function updateHeaderArrows() {
            const headers = document.querySelectorAll('#tickerTableHeadRow th.sortable');
            headers.forEach(th => {
                const key = th.getAttribute('data-sort');
                if (!key) return;
                
                // 기존 정렬 표시 제거 후 재생성
                let baseText = th.innerText.replace(/ [▲▼⇅]/g, '');
                
                if (sortKey === key) {
                    if (sortDirection === 'asc') {
                        th.innerText = baseText + ' ▲';
                        th.style.color = '#00b853';
                    } else if (sortDirection === 'desc') {
                        th.innerText = baseText + ' ▼';
                        th.style.color = '#00b853';
                    } else {
                        th.innerText = baseText + ' ⇅';
                        th.style.color = '#aaaaaa';
                    }
                } else {
                    th.innerText = baseText + ' ⇅';
                    th.style.color = '#aaaaaa';
                }
            });
        }
    </script>
</body>
</html>
