<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 섹터 수급 대시보드</title>
    <style>
        /* 메인화면과 동일한 베이스 디자인 */
        body { margin: 0; padding: 20px; background-color: #121212; color: white; font-family: sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #aaaaaa; z-index: 1000; }
        
        /* 상단 네비게이션 탭 (메인화면과 통일감) */
        .tab-container { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; }
        .tab-button { background: none; border: none; color: #aaaaaa; padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .tab-button:hover { color: white; background-color: #1e1e1e; }
        .tab-button.active { color: #00b853; border-bottom: 3px solid #00b853; }

        /* 컨트롤 패널 (날짜, ETF 선택) */
        .controls { background-color: #1e1e1e; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; display: flex; gap: 30px; align-items: center; }
        .controls-group { display: flex; align-items: center; gap: 10px; }
        .controls label { font-weight: bold; color: #aaaaaa; }
        .controls select { padding: 8px 15px; background-color: #121212; color: #00b853; border: 1px solid #333; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; outline: none; }
        .controls select:hover { border-color: #00b853; }

        /* 상단 지표 요약 박스 */
        .summary-box { background-color: #1e1e1e; padding: 20px 25px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #333; }
        .summary-box h2 { margin-top: 0; color: #e0e0e0; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .metric { display: flex; flex-direction: column; }
        .metric-title { font-size: 14px; color: #aaaaaa; font-weight: bold; margin-bottom: 5px; }
        .metric-value { font-size: 22px; font-weight: bold; color: white; }

        /* 테이블 디자인 (메인화면과 완벽 동일) */
        h2 { font-size: 20px; margin-bottom: 15px; color: #e0e0e0; }
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; margin-bottom: 50px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #2d2d2d; }
        th { background-color: #2a2a2a; color: #aaaaaa; font-weight: bold; }
        tr:hover { background-color: #252525; }
        
        /* 공통 컬러 (수익/손실) */
        .pos { color: #00b853; font-weight: bold; }
        .neg { color: #f03b20; font-weight: bold; }
        .neutral { color: #aaaaaa; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div class="container">
        <!-- 💡 네비게이션 탭 (메인으로 돌아가기 버튼 포함) -->
        <div class="tab-container">
            <button class="tab-button" onclick="location.href='index.html'">◀ 나스닥 메인으로 돌아가기</button>
            <button class="tab-button active">🔥 ETF 섹터 정밀 수급</button>
        </div>

        <!-- 옵션 선택 바 -->
        <div class="controls">
            <div class="controls-group">
                <label>ETF 선택:</label>
                <select id="etfSelect">
                    <option value="XLK">XLK (기술주)</option>
                    <option value="XLF">XLF (금융주)</option>
                    <option value="XLV">XLV (헬스케어)</option>
                    <option value="XLE">XLE (에너지)</option>
                </select>
            </div>
            <div class="controls-group">
                <label>조회 일자:</label>
                <select id="dateSelect"><option>로딩 중...</option></select>
            </div>
        </div>

        <!-- 윗부분: 지표 (Metrics) -->
        <div class="summary-box" id="topSection">
            <h2>📊 <span id="displayEtf" class="pos">XLK</span> 지표 요약 (<span id="displayDate">-</span>)</h2>
            <div class="summary-grid">
                <div class="metric">
                    <span class="metric-title">실제 자금 유출입 (Fund Flow)</span>
                    <span class="metric-value" id="fundFlow">-</span>
                </div>
                <div class="metric">
                    <span class="metric-title">수급 강도 (20일 평균 대비)</span>
                    <span class="metric-value" id="flowIntensity">-</span>
                </div>
                <div class="metric">
                    <span class="metric-title">상대 거래량 (RVOL)</span>
                    <span class="metric-value" id="rvol">-</span>
                </div>
                <div class="metric">
                    <span class="metric-title">수급 확산도 (Breadth)</span>
                    <span class="metric-value pos" id="breadth">-</span>
                </div>
                <div class="metric">
                    <span class="metric-title">상대 강도 (vs SPY)</span>
                    <span class="metric-value" id="rsMomentum">-</span>
                </div>
            </div>
        </div>

        <!-- 아랫부분: 종목 상세 (Details) -->
        <div id="bottomSection">
            <h2>🏢 개별 종목 수급 상세 내역</h2>
            <table>
                <thead>
                    <tr>
                        <th>티커</th>
                        <th>당일 종가</th>
                        <th>전일비 증감률</th>
                        <th>자금 유출입액 ($)</th>
                        <th>유입 비율 (vs보유금액)</th>
                    </tr>
                </thead>
                <tbody id="tickerTableBody">
                    <tr><td colspan="5">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let globalMetricsData = {};

        // 색상 판별 헬퍼 함수 (디자인 통일)
        function getColorClass(valueStr) {
            if (valueStr.includes('+') || valueStr.includes('유입')) return 'pos';
            if (valueStr.includes('-') || valueStr.includes('유출')) return 'neg';
            return 'neutral';
        }

        // 1. 페이지 로드 시 XL_metrics.json 가져오기
        fetch('./XL_metrics.json')
            .then(res => {
                if (!res.ok) throw new Error("메트릭스 파일 없음");
                return res.json();
            })
            .then(data => {
                globalMetricsData = data;
                document.getElementById('loading').style.display = 'none';
                updateDateDropdown('XLK'); 
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = '데이터를 불러오지 못했습니다.<br>파이썬 업데이트를 확인해주세요.';
                console.error(err);
            });

        // 2. 이벤트 리스너 (선택 변경 시)
        document.getElementById('etfSelect').addEventListener('change', (e) => {
            updateDateDropdown(e.target.value);
        });
        document.getElementById('dateSelect').addEventListener('change', () => {
            updateDashboard();
        });

        // 3. 날짜 드롭다운 세팅
        function updateDateDropdown(etf) {
            const dateSelect = document.getElementById('dateSelect');
            dateSelect.innerHTML = ""; 

            if (!globalMetricsData[etf] || !globalMetricsData[etf].history || Object.keys(globalMetricsData[etf].history).length === 0) {
                dateSelect.innerHTML = "<option>데이터 없음</option>";
                return;
            }

            // 최신 날짜순 정렬
            const dates = Object.keys(globalMetricsData[etf].history).sort().reverse();
            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = date;
                dateSelect.appendChild(option);
            });

            updateDashboard(); 
        }

        // 4. 화면 업데이트 (윗부분 + 아랫부분)
        function updateDashboard() {
            const etf = document.getElementById('etfSelect').value;
            const date = document.getElementById('dateSelect').value;

            if (date === "데이터 없음") return;

            // --- 윗부분 (Metrics) 초고속 렌더링 ---
            const metrics = globalMetricsData[etf].history[date];
            document.getElementById('displayEtf').innerText = etf;
            document.getElementById('displayDate').innerText = date;
            
            const elFundFlow = document.getElementById('fundFlow');
            elFundFlow.innerText = metrics.Fund_Flow.display;
            elFundFlow.className = 'metric-value ' + getColorClass(metrics.Fund_Flow.display);

            document.getElementById('flowIntensity').innerText = metrics.Fund_Flow_Intensity_20D.display;
            document.getElementById('rvol').innerText = metrics.Relative_Volume.display;
            document.getElementById('breadth').innerText = metrics.Weighted_Breadth.display;
            
            const elRs = document.getElementById('rsMomentum');
            elRs.innerText = metrics.RS_Momentum.display;
            elRs.className = 'metric-value ' + getColorClass(metrics.RS_Momentum.display);

            // --- 아랫부분 (Details) 지연 로딩 ---
            const detailUrl = `./details/${etf}/${date}.json`;
            const tbody = document.getElementById('tickerTableBody');
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>데이터 불러오는 중...</td></tr>";

            fetch(detailUrl)
                .then(res => {
                    if (!res.ok) throw new Error("상세 파일 없음");
                    return res.json();
                })
                .then(detailData => {
                    tbody.innerHTML = ""; 
                    const tickers = detailData.ticker_details;

                    for (const [ticker, info] of Object.entries(tickers)) {
                        const tr = document.createElement('tr');
                        
                        // 메인 사이트의 CSS 클래스(pos, neg)를 사용하여 색상 통일
                        const pctClass = getColorClass(info.display.price_change_pct);
                        const flowClass = getColorClass(info.display.dollar_flow);

                        tr.innerHTML = `
                            <td><b>${ticker}</b></td>
                            <td>${info.display.price}</td>
                            <td class="${pctClass}">${info.display.price_change_pct}</td>
                            <td class="${flowClass}">${info.display.dollar_flow}</td>
                            <td class="${flowClass}">${info.display.flow_ratio_pct}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                })
                .catch(err => {
                    tbody.innerHTML = "<tr><td colspan='5' class='neg' style='text-align:center;'>선택하신 날짜의 개별 종목 상세 데이터를 불러오지 못했습니다.</td></tr>";
                });
        }
    </script>
</body>
</html>
