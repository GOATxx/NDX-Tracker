<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나스닥 100 & 자금 흐름 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background-color: #121212; color: white; font-family: sans-serif; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #aaaaaa; z-index: 1000; display: none; }
        
        .tab-container { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .tab-button { background: none; border: none; color: #aaaaaa; padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .tab-button:hover { color: white; background-color: #1e1e1e; }
        .tab-button.active { color: #00b853; border-bottom: 3px solid #00b853; }
        
        #top-controls { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        
        .date-picker-wrapper { display: flex; align-items: center; gap: 10px; }
        .date-picker-label { font-weight: bold; color: #aaaaaa; }
        #date-picker { padding: 8px 15px; background-color: #1e1e1e; color: #00b853; border: 1px solid #333; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; outline: none; }
        #date-picker::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        #date-picker:hover { border-color: #00b853; }
        
        #date-info-bar { text-align: right; font-size: 14px; color: #888; }
        .date-badge { display: inline-block; background-color: #1e1e1e; padding: 5px 12px; border-radius: 4px; margin-left: 10px; border: 1px solid #333; }
        .date-badge span { color: #fff; font-weight: bold; margin-left: 5px; }

        .tab-content { display: none; max-width: 1200px; margin: 0 auto; }
        .tab-content.active { display: block; }

        #heatmap-container { width: 100%; height: 50vh; margin-bottom: 20px; }
        
        #weight-chart-container { width: 100%; height: 450px; margin-bottom: 30px; background-color: #1a1a1a; border-radius: 8px; border: 1px solid #333; }
        
        #ndx-summary { background-color: #1e1e1e; padding: 15px 25px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .summary-title { font-size: 18px; color: #aaaaaa; font-weight: bold; margin-bottom: 5px; }
        .summary-data { font-size: 22px; font-weight: bold; }
        .summary-data span { margin-right: 15px; }
        .summary-details { text-align: right; font-size: 15px; color: #e0e0e0; }
        .summary-error { margin-top: 5px; font-size: 13px; color: #888; }

        h2 { font-size: 20px; margin-bottom: 15px; color: #e0e0e0; }
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; margin-bottom: 50px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #2d2d2d; }
        th { background-color: #2a2a2a; color: #aaaaaa; font-weight: bold; }
        
        th.sortable { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        th.sortable:hover { background-color: #3a3a3a; color: #00b853; }

        .pos { color: #00b853; font-weight: bold; }
        .neg { color: #f03b20; font-weight: bold; }
        tr:hover { background-color: #252525; }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>
    
    <div class="tab-container">
        <button class="tab-button active" onclick="switchTab('tab-contribution')"> 지수 기여도 히트맵</button>
        <button class="tab-button" onclick="switchTab('tab-flow')"> QQQ 기업별 비중</button>
        <button class="tab-button" onclick="location.href='etf.html'"> ETF 섹터 수급 대시보드</button>
    </div>

    <div id="top-controls">
        <div class="date-picker-wrapper">
            <span class="date-picker-label">조회 일자:</span>
            <input type="date" id="date-picker" onchange="handleDateChange(this.value)" disabled>
        </div>
        <div id="date-info-bar"></div>
    </div>

    <div id="tab-contribution" class="tab-content active">
        <div id="heatmap-container"></div>
        <div id="ndx-summary" style="display: none;"></div>
        <h2>기업별 상세 데이터 정보</h2>
        <table id="stock-table">
            <thead>
                <tr id="contribTableHeadRow">
                    <th class="sortable" data-sort="Ticker">티커 ⇅</th>
                    <th class="sortable" data-sort="Current Price ($)">주가 ⇅</th>
                    <th class="sortable" data-sort="Change (%)">변동률 ⇅</th>
                    <th class="sortable" data-sort="Market Cap ($)">시가총액 ⇅</th>
                    <th class="sortable" data-sort="Point Contribution">지수 기여도 ⇅</th>
                </tr>
            </thead>
            <tbody id="table-body-contribution"></tbody>
        </table>
    </div>

    <div id="tab-flow" class="tab-content">
        <h2>QQQ ETF 기업 비중</h2>
        <div id="weight-chart-container"></div>
        
        <h2>QQQ 보유 주식 수 및 비중 상세 표</h2>
        <table id="flow-table">
            <thead>
                <tr id="flowTableHeadRow">
                    <th class="sortable" data-sort="Ticker">티커 ⇅</th>
                    <th class="sortable" data-sort="Shares Held">보유 주식 수 ⇅</th>
                    <th class="sortable" data-sort="Shares Change">전일 대비 증감량 ⇅</th>
                    <th class="sortable" data-sort="Shares Change (%)">증감률 (%) ⇅</th>
                    <th class="sortable" data-sort="Weight (%)">비중 (%) ⇅</th>
                </tr>
            </thead>
            <tbody id="table-body-flow"></tbody>
        </table>
    </div>

    <script>
        const baseUrl = 'https://raw.githubusercontent.com/GOATxx/NDX-Tracker/refs/heads/main/data/';

        const chartDom = document.getElementById('heatmap-container');
        const myChart = echarts.init(chartDom);
        
        const weightChartDom = document.getElementById('weight-chart-container');
        const weightChart = echarts.init(weightChartDom);

        let globalStockData = []; 
        
        let contribDataList = [];
        let contribDefaultList = [];
        let contribSortKey = null;
        let contribSortDirection = 'none';

        let flowDataList = [];
        let flowDefaultList = [];
        let flowSortKey = null;
        let flowSortDirection = 'none';
        
        let availableDatesList = [];

        document.getElementById('loading').style.display = 'block';
        fetch(baseUrl + 'available_dates.json')
            .then(res => res.json())
            .then(dates => {
                availableDatesList = dates; 
                const picker = document.getElementById('date-picker');
                
                if (dates.length > 0) {
                    picker.disabled = false; 
                    
                    picker.max = dates[0];                  
                    picker.min = dates[dates.length - 1];   
                    
                    picker.value = dates[0];
                    loadData(dates[0]);
                } else {
                    document.getElementById('loading').innerText = '저장된 날짜 데이터가 없습니다.';
                }
            })
            .catch(err => {
                console.error("메뉴판 로딩 실패. latest.json 직접 로딩 시도", err);
                loadData('latest');
            });

        function handleDateChange(selectedDate) {
            if (!selectedDate) return;

            if (availableDatesList.includes(selectedDate)) {
                document.getElementById('loading').style.display = 'block';
                loadData(selectedDate);
            } else {
                const closestPastDate = availableDatesList.find(d => d < selectedDate);
                
                if (closestPastDate) {
                    alert(`선택하신 ${selectedDate}은(는) 휴장일 또는 데이터가 없는 날입니다.\n가장 가까운 이전 거래일인 [${closestPastDate}] 데이터를 불러옵니다.`);
                    document.getElementById('date-picker').value = closestPastDate; 
                    document.getElementById('loading').style.display = 'block';
                    loadData(closestPastDate);
                } else {
                    alert('해당 날짜 이전의 데이터가 존재하지 않습니다.');
                    document.getElementById('date-picker').value = availableDatesList[0];
                }
            }
        }

        function loadData(dateString) {
            const fetchUrl = `${baseUrl}${dateString}.json`;
            
            fetch(fetchUrl)
                .then(res => res.ok ? res.json() : Promise.reject('데이터 서빙 실패: ' + dateString))
                .then(jsonResponse => {
                    document.getElementById('loading').style.display = 'none';
                    const metadata = jsonResponse.metadata || {};
                    const dataList = jsonResponse.data || jsonResponse;

                    if (metadata.market_date && metadata.invesco_date) {
                        document.getElementById('date-info-bar').innerHTML = `
                            <div class="date-badge">🇺🇸 미국 시장 기준일 <span>${metadata.market_date}</span></div>
                            <div class="date-badge">🏦 QQQ 기준일 <span>${metadata.invesco_date}</span></div>
                        `;
                    }

                    let sumPos = 0; let sumNeg = 0;
                    dataList.forEach(item => {
                        const pt = item['Point Contribution'];
                        if (pt && pt > 0) sumPos += pt;
                        else if (pt && pt < 0) sumNeg += pt;
                    });
                    const calculatedTotal = sumPos + sumNeg;

                    if (metadata.ndx_current_pt) {
                        const ndxPt = metadata.ndx_current_pt; const ndxChg = metadata.ndx_point_change; const ndxPct = metadata.ndx_percent_change;
                        const isPos = ndxChg >= 0; const sign = isPos ? '+' : ''; const colorClass = isPos ? 'pos' : 'neg';
                        const errorPt = calculatedTotal - ndxChg; const errorSign = errorPt > 0 ? '+' : '';

                        const summaryDiv = document.getElementById('ndx-summary');
                        summaryDiv.style.display = 'flex';
                        summaryDiv.innerHTML = `
                            <div>
                                <div class="summary-title">NASDAQ 100 Index</div>
                                <div class="summary-data"><span style="color: white;">${ndxPt.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span><span class="${colorClass}">${sign}${ndxChg.toFixed(2)} pt</span><span class="${colorClass}">(${sign}${ndxPct.toFixed(2)}%)</span></div>
                            </div>
                            <div class="summary-details">
                                <div>기여도 분해: <span class="pos">+${sumPos.toFixed(2)} pt</span> / <span class="neg">${sumNeg.toFixed(2)} pt</span></div>
                                <div class="summary-error">↳ 계산 합계: ${calculatedTotal > 0 ? '+' : ''}${calculatedTotal.toFixed(2)} pt (오차: ${errorSign}${errorPt.toFixed(2)} pt)</div>
                            </div>
                        `;
                    }

                    globalStockData = dataList.filter(item => item['Point Contribution'] != null);
                    
                    contribDataList = [...globalStockData];
                    contribDefaultList = [...globalStockData];
                    contribSortKey = null;
                    contribSortDirection = 'none';

                    flowDataList = [...globalStockData];
                    flowDefaultList = [...globalStockData];
                    flowSortKey = null;
                    flowSortDirection = 'none';

                    renderHeatmap(globalStockData);
                    renderWeightDoughnut(globalStockData); 
                    
                    applyContribSortAndRender();
                    applyFlowSortAndRender();
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if (tabId === 'tab-contribution' && myChart) myChart.resize();
            if (tabId === 'tab-flow' && weightChart) weightChart.resize();
        }

        function formatMarketCap(mcap) {
            if (!mcap || mcap === 0) return 'N/A';
            return mcap >= 1000000000000 ? `$${(mcap / 1000000000000).toFixed(2)} T` : `$${(mcap / 1000000000).toFixed(2)} B`;
        }

        function getHeatmapColor(changePercent, isPositive) {
            let alpha = 0.25 + (Math.abs(changePercent) / 4) * 0.75;
            if (alpha > 1) alpha = 1.0; 
            return isPositive ? `rgba(0, 184, 83, ${alpha})` : `rgba(240, 59, 32, ${alpha})`;
        }

        function renderHeatmap(data) {
            const treemapData = data.map(item => ({
                name: item.Ticker, value: Math.abs(item['Point Contribution']), 
                itemStyle: { color: getHeatmapColor(item['Change (%)'], item['Point Contribution'] >= 0) },
                // extraInfo에 주가(Current Price ($)) 정보 추가
                extraInfo: { 
                    change: item['Change (%)'], 
                    point: item['Point Contribution'], 
                    mcap: item['Market Cap ($)'],
                    price: item['Current Price ($)']
                }
            }));

            myChart.setOption({
                // 기여도와 시가총액 사이에 주가 정보 표시하도록 수정
                tooltip: { 
                    formatter: d => { 
                        if (!d.data || !d.data.extraInfo) return ''; 
                        const ext = d.data.extraInfo; 
                        const formattedPrice = ext.price != null ? `$${ext.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}` : 'N/A';
                        return `<div style="font-size: 16px; font-weight: bold; color:#121212;">${d.data.name}</div>` +
                               `<span style="color:#121212;">등락률: ${ext.change > 0 ? '+' : ''}${ext.change}%</span><br/>` +
                               `<span style="color:#121212;">기여도: ${ext.point > 0 ? '+' : ''}${ext.point} pt</span><br/>` +
                               `<span style="color:#121212;">주가: ${formattedPrice}</span><br/>` +
                               `<span style="color:#121212;">시가총액: ${formatMarketCap(ext.mcap)}</span>`; 
                    } 
                },
                series: [{ type: 'treemap', data: treemapData, roam: false, nodeClick: false, breadcrumb: { show: false }, label: { show: true, formatter: i => `${i.name}\n${i.data.extraInfo.change > 0 ? '+' : ''}${i.data.extraInfo.change}%\n${i.data.extraInfo.point > 0 ? '+' : ''}${i.data.extraInfo.point}pt`, fontSize: 13, color: '#ffffff' }, itemStyle: { borderColor: '#121212', borderWidth: 2 } }]
            });
        }

        function renderWeightDoughnut(data) {
            let mainData = [];
            let othersWeight = 0;

            const sortedData = [...data].sort((a, b) => (b['Weight (%)'] || 0) - (a['Weight (%)'] || 0));

            sortedData.forEach(item => {
                const w = item['Weight (%)'];
                if (w && w > 0.5) {
                    let dataItem = { name: item.Ticker, value: w };
                    if (w < 2) {
                        dataItem.label = { show: false };      
                        dataItem.labelLine = { show: false };  
                    }
                    mainData.push(dataItem);
                } else if (w && w <= 0.5) {
                    othersWeight += w;
                }
            });

            if (othersWeight > 0) {
                let othersItem = { 
                    name: '기타 (0.5% 이하)', 
                    value: Number(othersWeight.toFixed(2)),
                    itemStyle: { color: '#444444' }
                };
                if (othersWeight < 2) {
                    othersItem.label = { show: false };
                    othersItem.labelLine = { show: false };
                }
                mainData.push(othersItem);
            }

            weightChart.setOption({
                graphic: [{
                    type: 'image', id: 'logo', left: 'center', top: 'center', z: -10, bounding: 'raw',
                    style: { image: 'https://imageio.forbes.com/specials-images/imageserve/65d60b719caf7ca7562bcb24/0x0.png?format=png&crop=500,500,x0,y0,safe&width=300', width: 200, height: 200, opacity: 1 }
                }],
                tooltip: { trigger: 'item', formatter: '{b}: {c}%' },
                series: [{
                    name: 'QQQ 비중', type: 'pie', radius: ['50%', '80%'], avoidLabelOverlap: true,
                    itemStyle: { borderRadius: 6, borderColor: '#1a1a1a', borderWidth: 2 },
                    label: { show: true, position: 'outside', color: '#e0e0e0', fontSize: 12, formatter: '{b}\n{c}%' },
                    labelLine: { show: true, length: 15, length2: 10 },
                    data: mainData
                }]
            });
        }

        function handleContribSort(key) {
            if (contribSortKey === key) {
                if (contribSortDirection === 'none') {
                    contribSortDirection = 'desc';
                } else if (contribSortDirection === 'desc') {
                    contribSortDirection = 'asc';
                } else {
                    contribSortDirection = 'none';
                    contribSortKey = null;
                }
            } else {
                contribSortKey = key;
                contribSortDirection = 'desc';
            }
            applyContribSortAndRender();
        }

        function applyContribSortAndRender() {
            let listToSort = [...contribDataList];

            if (contribSortKey && contribSortDirection !== 'none') {
                listToSort.sort((a, b) => {
                    let valA = a[contribSortKey] ?? 0;
                    let valB = b[contribSortKey] ?? 0;

                    if (contribSortKey === 'Ticker') {
                        return contribSortDirection === 'asc' 
                            ? valA.localeCompare(valB) 
                            : valB.localeCompare(valA);
                    }
                    return contribSortDirection === 'asc' ? valA - valB : valB - valA;
                });
            } else {
                listToSort = [...contribDefaultList];
            }

            renderTableContribution(listToSort);
            updateContribHeaderArrows();
        }

        function renderTableContribution(data) {
            const tbody = document.getElementById('table-body-contribution');
            tbody.innerHTML = ''; 
            data.forEach(item => {
                const isPos = item['Point Contribution'] >= 0; const changeClass = isPos ? 'pos' : 'neg'; const sign = isPos ? '+' : '';
                tbody.innerHTML += `<tr><td class="bold-white">${item.Ticker}</td><td>$${item['Current Price ($)'].toLocaleString()}</td><td class="${changeClass}">${sign}${item['Change (%)']}%</td><td>${formatMarketCap(item['Market Cap ($)'])}</td><td class="${changeClass}">${sign}${item['Point Contribution']} pt</td></tr>`;
            });
        }

        function updateContribHeaderArrows() {
            const headers = document.querySelectorAll('#contribTableHeadRow th.sortable');
            headers.forEach(th => {
                const key = th.getAttribute('data-sort');
                if (!key) return;
                
                let baseText = th.innerText.replace(/ [▲▼⇅]/g, '');
                
                if (contribSortKey === key) {
                    if (contribSortDirection === 'asc') {
                        th.innerText = baseText + ' ▲';
                        th.style.color = '#f03b20';
                    } else if (contribSortDirection === 'desc') {
                        th.innerText = baseText + ' ▼';
                        th.style.color = '#00b853';
                    } else {
                        th.innerText = baseText + ' ⇅';
                        th.style.color = '#aaaaaa';
                    }
                } else {
                    th.innerText = baseText + ' ⇅';
                    th.style.color = '#aaaaaa';
                }
            });
        }

        function handleFlowSort(key) {
            if (flowSortKey === key) {
                if (flowSortDirection === 'none') {
                    flowSortDirection = 'desc';
                } else if (flowSortDirection === 'desc') {
                    flowSortDirection = 'asc';
                } else {
                    flowSortDirection = 'none';
                    flowSortKey = null;
                }
            } else {
                flowSortKey = key;
                flowSortDirection = 'desc';
            }
            applyFlowSortAndRender();
        }

        function applyFlowSortAndRender() {
            let listToSort = [...flowDataList];

            if (flowSortKey && flowSortDirection !== 'none') {
                listToSort.sort((a, b) => {
                    let valA = a[flowSortKey] ?? 0;
                    let valB = b[flowSortKey] ?? 0;

                    if (flowSortKey === 'Ticker') {
                        return flowSortDirection === 'asc' 
                            ? valA.localeCompare(valB) 
                            : valB.localeCompare(valA);
                    }
                    return flowSortDirection === 'asc' ? valA - valB : valB - valA;
                });
            } else {
                listToSort = [...flowDefaultList];
            }

            renderTableFlow(listToSort);
            updateFlowHeaderArrows();
        }

        function renderTableFlow(data) {
            const tbody = document.getElementById('table-body-flow');
            tbody.innerHTML = ''; 
            data.forEach(item => {
                let changeClass = ''; let sign = '';
                if (item['Shares Change'] > 0) { changeClass = 'pos'; sign = '+'; } else if (item['Shares Change'] < 0) { changeClass = 'neg'; sign = ''; }
                const weight = item['Weight (%)'] ? item['Weight (%)'].toFixed(2) + '%' : 'N/A';
                tbody.innerHTML += `<tr><td class="bold-white">${item.Ticker}</td><td>${item['Shares Held'].toLocaleString()} 주</td><td class="${changeClass}">${sign}${item['Shares Change'].toLocaleString()}</td><td class="${changeClass}">${sign}${item['Shares Change (%)']}%</td><td style="font-weight:bold; color:#00b853;">${weight}</td></tr>`;
            });
        }

        function updateFlowHeaderArrows() {
            const headers = document.querySelectorAll('#flowTableHeadRow th.sortable');
            headers.forEach(th => {
                const key = th.getAttribute('data-sort');
                if (!key) return;
                
                let baseText = th.innerText.replace(/ [▲▼⇅]/g, '');
                
                if (flowSortKey === key) {
                    if (flowSortDirection === 'asc') {
                        th.innerText = baseText + ' ▲';
                        th.style.color = '#f03b20';
                    } else if (flowSortDirection === 'desc') {
                        th.innerText = baseText + ' ▼';
                        th.style.color = '#00b853';
                    } else {
                        th.innerText = baseText + ' ⇅';
                        th.style.color = '#aaaaaa';
                    }
                } else {
                    th.innerText = baseText + ' ⇅';
                    th.style.color = '#aaaaaa';
                }
            });
        }

        document.querySelectorAll('#contribTableHeadRow th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.getAttribute('data-sort');
                handleContribSort(key);
            });
        });

        document.querySelectorAll('#flowTableHeadRow th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.getAttribute('data-sort');
                handleFlowSort(key);
            });
        });

        window.addEventListener('resize', () => {
            if(myChart) myChart.resize();
            if(weightChart) weightChart.resize();
        });
    </script>
</body>
</html>
