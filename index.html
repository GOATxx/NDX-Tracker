<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나스닥 100 & 자금 흐름 대시보드 / Nasdaq 100 & Flow Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background-color: #121212; color: white; font-family: sans-serif; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #aaaaaa; z-index: 1000; display: none; }
        
        /* 상단 헤더 래퍼 및 탭 메뉴 */
        .header-wrapper { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; margin-bottom: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .tab-container { display: flex; }
        .tab-button { background: none; border: none; color: #aaaaaa; padding: 15px 20px; font-size: 16px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .tab-button:hover { color: white; background-color: #1e1e1e; }
        .tab-button.active { color: #00b853; border-bottom: 3px solid #00b853; }
        
        /* 언어 선택 버튼 디자인 */
        .lang-switcher { display: flex; gap: 8px; align-items: center; margin-right: 10px; }
        .lang-btn {
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #aaaaaa;
            height: 36px;
            padding: 0 16px;
            box-sizing: border-box; 
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .lang-btn.active {
            background-color: #00b853;
            border-color: #00b853;
            color: white;
        }
        .lang-btn:hover:not(.active) {
            border-color: #555;
            color: white;
        }

        #top-controls { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        
        .date-picker-wrapper { display: flex; align-items: center; gap: 10px; }
        .date-picker-label { font-weight: bold; color: #aaaaaa; }
        #date-picker { padding: 8px 15px; background-color: #1e1e1e; color: #00b853; border: 1px solid #333; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; outline: none; }
        #date-picker::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        #date-picker:hover { border-color: #00b853; }

        .tab-content { display: none; max-width: 1200px; margin: 0 auto; }
        .tab-content.active { display: block; }

        #heatmap-container { width: 100%; height: 50vh; margin-bottom: 20px; }
        
        #weight-chart-container { width: 100%; height: 450px; margin-bottom: 30px; background-color: #1a1a1a; border-radius: 8px; border: 1px solid #333; }
        
        #ndx-summary { background-color: #1e1e1e; padding: 15px 25px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .summary-title { font-size: 18px; color: #aaaaaa; font-weight: bold; margin-bottom: 5px; }
        .summary-data { font-size: 22px; font-weight: bold; }
        .summary-data span { margin-right: 15px; }
        .summary-details { text-align: right; font-size: 15px; color: #e0e0e0; }
        .summary-error { margin-top: 5px; font-size: 13px; color: #888; }

        h2 { font-size: 20px; margin-bottom: 15px; color: #e0e0e0; }
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; margin-bottom: 50px; }
        th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #2d2d2d; }
        th { background-color: #2a2a2a; color: #aaaaaa; font-weight: bold; }
        
        th.sortable { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        th.sortable:hover { background-color: #3a3a3a; color: #00b853; }

        .pos { color: #00b853; font-weight: bold; }
        .neg { color: #f03b20; font-weight: bold; }
        tr:hover { background-color: #252525; }

        /* 수급 탭 전용 레이아웃 스타일 */
        .section-box { background-color: #1e1e1e; padding: 20px 25px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #333; overflow-x: auto; }
        .trend-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; }
        .qqq-period-btn, .qqq-channel-period-btn { background-color: #222; border: 1px solid #444; color: #aaa; padding: 6px 15px; font-size: 14px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: all 0.2s; }
        .qqq-period-btn:hover, .qqq-channel-period-btn:hover { background-color: #333; color: white; border-color: #00b853; }
        .qqq-period-btn.active, .qqq-channel-period-btn.active { background-color: #00b853; color: white; border-color: #00b853; }

        /* 반응형 대응 */
        @media (max-width: 768px) {
            .header-wrapper { flex-direction: column; align-items: stretch; gap: 10px; padding-bottom: 10px; }
            .lang-switcher { justify-content: flex-end; }
            #top-controls { flex-direction: column; gap: 15px; align-items: flex-start; }
            #date-info-bar { text-align: left; width: 100%; }
            .date-badge { margin-left: 0; margin-right: 10px; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div id="loading" data-i18n="loading">데이터를 불러오는 중입니다...</div>
    
    <div class="header-wrapper">
        <div class="tab-container">
            <button class="tab-button active" onclick="switchTab('tab-contribution')" data-i18n="tab_contribution"> 지수 기여도 히트맵</button>
            <button class="tab-button" onclick="switchTab('tab-flow')" data-i18n="tab_flow"> QQQ 기업별 비중</button>
            <button class="tab-button" onclick="goToEtfPage()" data-i18n="tab_etf_redirect"> ETF 섹터 수급 대시보드</button>
        </div>
        <div class="lang-switcher">
            <button id="lang-ko" class="lang-btn active" onclick="setLanguage('ko')">한국어</button>
            <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">English</button>
        </div>
    </div>

    <div id="top-controls">
        <div class="date-picker-wrapper">
            <span class="date-picker-label" data-i18n="select_date">조회 일자:</span>
            <input type="date" id="date-picker" onchange="handleDateChange(this.value)" disabled>
        </div>
    </div>

    <div id="tab-contribution" class="tab-content active">
        <div id="heatmap-container"></div>
        <div id="ndx-summary" style="display: none;"></div>
        <h2 data-i18n="title_contrib_table">기업별 상세 데이터 정보</h2>
        <table id="stock-table">
            <thead>
                <tr id="contribTableHeadRow">
                    <th class="sortable" data-sort="Ticker">티커 ⇅</th>
                    <th class="sortable" data-sort="Current Price ($)">주가 ⇅</th>
                    <th class="sortable" data-sort="Change (%)">변동률 ⇅</th>
                    <th class="sortable" data-sort="Market Cap ($)">시가총액 ⇅</th>
                    <th class="sortable" data-sort="Point Contribution">지수 기여도 ⇅</th>
                </tr>
            </thead>
            <tbody id="table-body-contribution"></tbody>
        </table>
    </div>

    <div id="tab-flow" class="tab-content">
        <!-- 1. QQQ 자금 유출입 추세 및 흐름 그래프 -->
        <div class="section-box">
            <h2><span data-i18n="title_trend">QQQ 자금 유출입 추세 및 흐름</span> <span id="qqq-trend-stats" style="font-size: 13px; color: #aaaaaa; font-weight: normal; margin-left: 15px;"></span></h2>
            <div class="trend-controls">
                <span style="font-weight: bold; color: #aaaaaa; font-size:14px;" data-i18n="lbl_period">조회 기간:</span>
                <button class="qqq-period-btn active" data-period="20D">20D</button>
                <button class="qqq-period-btn" data-period="50D">50D</button>
                <button class="qqq-period-btn" data-period="100D">100D</button>
                <button class="qqq-period-btn" data-period="200D">200D</button>
                <button class="qqq-period-btn" data-period="1Y">1Y</button>
            </div>
            <div id="qqq-flow-trend-chart-container" style="width: 100%; height: 500px; background-color: #1a1a1a; border-radius: 8px;"></div>
        </div>

        <!-- 2. QQQ 자금 유출입 변동성 채널 (Z-Score) 그래프 -->
        <div class="section-box">
            <h2 data-i18n="title_channel_chart">QQQ 자금 유출입 변동성 채널 (Z-Score)</h2>
            <div class="trend-controls">
                <span style="font-weight: bold; color: #aaaaaa; font-size:14px;" data-i18n="lbl_channel_period">기간 선택:</span>
                <button class="qqq-channel-period-btn active" data-period="20D">20D</button>
                <button class="qqq-channel-period-btn" data-period="50D">50D</button>
                <button class="qqq-channel-period-btn" data-period="100D">100D</button>
                <button class="qqq-channel-period-btn" data-period="200D">200D</button>
                <button class="qqq-channel-period-btn" data-period="1Y">1Y</button>
            </div>
            <div id="qqq-zscore-channel-chart-container" style="width: 100%; height: 480px; background-color: #1a1a1a; border-radius: 8px;"></div>
        </div>

        <h2 data-i18n="title_qqq_weights">QQQ ETF 기업 비중</h2>
        <div id="weight-chart-container"></div>
        
        <h2 data-i18n="title_qqq_table">QQQ 보유 주식 수 및 비중 상세 표</h2>
        <table id="flow-table">
            <thead>
                <tr id="flowTableHeadRow">
                    <th class="sortable" data-sort="Ticker">티커 ⇅</th>
                    <th class="sortable" data-sort="Shares Held">보유 주식 수 ⇅</th>
                    <th class="sortable" data-sort="Shares Change">전일 대비 증감량 ⇅</th>
                    <th class="sortable" data-sort="Shares Change (%)">증감률 (%) ⇅</th>
                    <th class="sortable" data-sort="Weight (%)">비중 (%) ⇅</th>
                </tr>
            </thead>
            <tbody id="table-body-flow"></tbody>
        </table>
    </div>

    <script>
        const baseUrl = 'https://raw.githubusercontent.com/GOATxx/NDX-Tracker/refs/heads/main/data/';

        const chartDom = document.getElementById('heatmap-container');
        const myChart = echarts.init(chartDom);
        
        const weightChartDom = document.getElementById('weight-chart-container');
        const weightChart = echarts.init(weightChartDom);

        // 자금 수급 현황용 차트 인스턴스 전역 변수 설정 [1]
        let qqqTrendChart = null;
        let qqqZScoreChannelChart = null;

        // 다국어 딕셔너리 구성 (자금 유입 관련 딕셔너리 확장 반영) [1, 2]
        const i18n = {
            ko: {
                loading: "데이터를 불러오는 중입니다...",
                no_dates: "저장된 날짜 데이터가 없습니다.",
                tab_contribution: " 지수 기여도 히트맵",
                tab_flow: " QQQ 기업별 비중",
                tab_etf_redirect: " ETF 섹터 수급 대시보드",
                select_date: "조회 일자:",
                us_market_date: "🇺🇸 미국 시장 기준일",
                qqq_date: "🏦 QQQ 기준일",
                title_contrib_table: "기업별 상세 데이터 정보",
                col_ticker: "티커",
                col_price: "주가",
                col_change: "변동률",
                col_mcap: "시가총액",
                col_contrib: "지수 기여도",
                title_qqq_weights: "QQQ ETF 기업 비중",
                title_qqq_table: "QQQ 보유 주식 수 및 비중 상세 표",
                col_shares: "보유 주식 수",
                col_shares_change: "전일 대비 증감량",
                col_shares_change_pct: "증감률 (%)",
                col_weight: "비중 (%)",
                tooltip_change: "등락률",
                tooltip_contrib: "기여도",
                tooltip_price: "주가",
                tooltip_mcap: "시가총액",
                chart_others: "기타 (0.5% 이하)",
                chart_qqq_weight: "QQQ 비중",
                summary_contrib_decomp: "기여도 분해",
                summary_calc_sum: "계산 합계",
                summary_error: "오차",
                shares_unit: " 주",
                alert_holiday: "선택하신 {selectedDate}은(는) 휴장일 또는 데이터가 없는 날입니다.\n가장 가까운 이전 거래일인 [{closestPastDate}] 데이터를 불러옵니다.",
                alert_no_prior: "해당 날짜 이전의 데이터가 존재하지 않습니다.",

                // QQQ 자금 유입 관련 번역 문구 이식
                title_trend: "QQQ 자금 유출입 추세 및 흐름",
                lbl_period: "조회 기간:",
                cum_flow: "누적 자금 유출입량",
                daily_flow: "당일 자금 유출입량",
                weekly_flow: "주간 자금 유출입량",
                etf_price_title: "QQQ 종가",
                title_channel_chart: "QQQ 자금 유출입 변동성 채널 (Z-Score)",
                lbl_channel_period: "기간 선택:",
                channel_mean: "20일 평균 수급선",
                channel_actual: "일일 수급 위치 (Z-Score)",
                accumulating: "데이터 누적 중",
                no_change: "변동 없음",
                no_data: "데이터 부족",
                inflow: "유입",
                outflow: "유출"
            },
            en: {
                loading: "Loading data...",
                no_dates: "No saved date data available.",
                tab_contribution: " Index Contribution Heatmap",
                tab_flow: " QQQ Stock Weights",
                tab_etf_redirect: " Sector ETF Flow Dashboard",
                select_date: "Select Date:",
                us_market_date: "🇺🇸 US Market Date",
                qqq_date: "🏦 QQQ Date",
                title_contrib_table: "Detailed Stock Data",
                col_ticker: "Ticker",
                col_price: "Price",
                col_change: "Change (%)",
                col_mcap: "Market Cap",
                col_contrib: "Point Contribution",
                title_qqq_weights: "QQQ ETF Stock Weights",
                title_qqq_table: "QQQ Shares Held & Weights Detail Table",
                col_shares: "Shares Held",
                col_shares_change: "Daily Change (Shares)",
                col_shares_change_pct: "Change (%)",
                col_weight: "Weight (%)",
                tooltip_change: "Change Rate",
                tooltip_contrib: "Contribution",
                tooltip_price: "Price",
                tooltip_mcap: "Market Cap",
                chart_others: "Others (<= 0.5%)",
                chart_qqq_weight: "QQQ Weight",
                summary_contrib_decomp: "Contribution Breakdown",
                summary_calc_sum: "Calculated Sum",
                summary_error: "Error",
                shares_unit: " shares",
                alert_holiday: "The selected date {selectedDate} is a market holiday or has no data.\nLoading the closest previous trading day [{closestPastDate}] instead.",
                alert_no_prior: "There is no data prior to this date.",

                // QQQ Fund Flow Translations
                title_trend: "QQQ Fund Flow Trend & Flows",
                lbl_period: "Period:",
                cum_flow: "Cumulative Flow",
                daily_flow: "Daily Flow",
                weekly_flow: "Weekly Flow",
                etf_price_title: "QQQ Price",
                title_channel_chart: "QQQ Fund Flow Volatility Channel (Z-Score)",
                lbl_channel_period: "Period:",
                channel_mean: "20D Mean Flow Line",
                channel_actual: "Daily Flow (Z-Score Dot)",
                accumulating: "Accumulating",
                no_change: "No Change",
                no_data: "No Data",
                inflow: "Inflow",
                outflow: "Outflow"
            }
        };

        let currentLang = 'ko'; 

        let globalStockData = []; 
        let globalMetadata = {};
        let globalCalculatedTotal = 0;
        let globalSumPos = 0;
        let globalSumNeg = 0;
        
        let contribDataList = [];
        let contribDefaultList = [];
        let contribSortKey = null;
        let contribSortDirection = 'none';

        let flowDataList = [];
        let flowDefaultList = [];
        let flowSortKey = null;
        let flowSortDirection = 'none';
        
        let availableDatesList = [];
        
        // QQQ 전용 수급 히스토리 객체 및 필터 기간 [2]
        let globalQqqMetrics = {};
        let selectedPeriod = '20D';
        let channelSelectedPeriod = '20D';

        // 달러 표기 가독성용 포맷 도구 선언 [2]
        function formatDollarJS(value) {
            if (value === 0) return "$0";
            const absVal = Math.abs(value);
            if (absVal >= 1e9) return `$${(absVal / 1e9).toFixed(2)}B`;
            if (absVal >= 1e6) return `$${(absVal / 1e6).toFixed(2)}M`;
            return `$${Math.round(absVal).toLocaleString()}`;
        }

        function formatDollarWithSignJS(value) {
            if (value === 0) return "$0";
            const prefix = value > 0 ? "+" : "-";
            const absVal = Math.abs(value);
            let valStr = "";
            if (absVal >= 1e9) valStr = `$${(absVal / 1e9).toFixed(2)}B`;
            else if (absVal >= 1e6) valStr = `$${(absVal / 1e6).toFixed(2)}M`;
            else valStr = `$${Math.round(absVal).toLocaleString()}`;
            return prefix + valStr;
        }

        // 페이지 로드 시 URL 파라미터에서 언어 설정 확인
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang === 'en' || urlLang === 'ko') {
            currentLang = urlLang;
        }

        // 초기 언어 적용
        setLanguage(currentLang);

        document.getElementById('loading').style.display = 'block';

        // QQQ 자금 유출입 데이터(QQQ_metrics.json) 및 거래 일자 동시 비동기 로딩 [2]
        Promise.all([
            fetch(baseUrl + 'available_dates.json').then(res => res.json()),
            fetch('./QQQ_metrics.json').then(res => res.json()).catch(err => {
                console.error("QQQ 수급 정보 파싱 실패", err);
                return {};
            })
        ])
        .then(([dates, qqqMetrics]) => {
            availableDatesList = dates; 
            globalQqqMetrics = qqqMetrics;
            const picker = document.getElementById('date-picker');
            
            if (dates.length > 0) {
                picker.disabled = false; 
                
                picker.max = dates[0];                  
                picker.min = dates[dates.length - 1];   
                
                picker.value = dates[0];
                loadData(dates[0]);
            } else {
                document.getElementById('loading').innerText = i18n[currentLang].no_dates;
            }
        })
        .catch(err => {
            console.error("초기 데이터 파이프 구축 실패", err);
            loadData('latest');
        });

        // 수급 지표에 부합하는 기준일 산출용 헬퍼 함수 [2]
        function getClosestQqqAvailableDate(targetDate) {
            const history = globalQqqMetrics["QQQ"]?.history || {};
            const availableDates = Object.keys(history).sort().reverse();
            if (availableDates.length === 0) return null;
            if (availableDates.includes(targetDate)) return targetDate;
            const previousDate = availableDates.find(d => d < targetDate);
            if (previousDate) return previousDate;
            return availableDates[availableDates.length - 1];
        }

        function handleDateChange(selectedDate) {
            if (!selectedDate) return;

            if (availableDatesList.includes(selectedDate)) {
                document.getElementById('loading').style.display = 'block';
                loadData(selectedDate);
            } else {
                const closestPastDate = availableDatesList.find(d => d < selectedDate);
                
                if (closestPastDate) {
                    const alertMsg = i18n[currentLang].alert_holiday
                        .replace('{selectedDate}', selectedDate)
                        .replace('{closestPastDate}', closestPastDate);
                    alert(alertMsg);
                    document.getElementById('date-picker').value = closestPastDate; 
                    document.getElementById('loading').style.display = 'block';
                    loadData(closestPastDate);
                } else {
                    alert(i18n[currentLang].alert_no_prior);
                    document.getElementById('date-picker').value = availableDatesList[0];
                }
            }
        }

        function loadData(dateString) {
            const fetchUrl = `${baseUrl}${dateString}.json`;
            
            fetch(fetchUrl)
                .then(res => res.ok ? res.json() : Promise.reject('데이터 서빙 실패: ' + dateString))
                .then(jsonResponse => {
                    document.getElementById('loading').style.display = 'none';
                    const metadata = jsonResponse.metadata || {};
                    const dataList = jsonResponse.data || jsonResponse;

                    globalMetadata = metadata;

                    let sumPos = 0; let sumNeg = 0;
                    dataList.forEach(item => {
                        const pt = item['Point Contribution'];
                        if (pt && pt > 0) sumPos += pt;
                        else if (pt && pt < 0) sumNeg += pt;
                    });
                    globalCalculatedTotal = sumPos + sumNeg;
                    globalSumPos = sumPos;
                    globalSumNeg = sumNeg;

                    renderNdxSummary();

                    globalStockData = dataList.filter(item => item['Point Contribution'] != null);
                    
                    contribDataList = [...globalStockData];
                    contribDefaultList = [...globalStockData];
                    contribSortKey = null;
                    contribSortDirection = 'none';

                    flowDataList = [...globalStockData];
                    flowDefaultList = [...globalStockData];
                    flowSortKey = null;
                    flowSortDirection = 'none';

                    renderHeatmap(globalStockData);
                    renderWeightDoughnut(globalStockData); 

                    // QQQ 전용 수급 차트 컴포넌트 렌더링 동기화 [2]
                    updateQqqTrendChart();
                    updateQqqZScoreChannelChart();
                    
                    applyContribSortAndRender();
                    applyFlowSortAndRender();
                })
                .catch(err => {

        // QQQ 자금 유출입 트렌드 데이터 취합 및 차트 드로잉 [2]
        function updateQqqTrendChart() {
            const pickerVal = document.getElementById('date-picker').value;
            const t = i18n[currentLang];
            const trendDom = document.getElementById('qqq-flow-trend-chart-container');

            if (!trendDom) return;
            if (!qqqTrendChart) {
                qqqTrendChart = echarts.init(trendDom);
            }

            if (!pickerVal || !globalQqqMetrics["QQQ"]) return;

            const actualDate = getClosestQqqAvailableDate(pickerVal);
            if (!actualDate) return;

            const history = globalQqqMetrics["QQQ"].history;
            const sortedDates = Object.keys(history).sort();
            const targetIdx = sortedDates.indexOf(actualDate);
            if (targetIdx === -1) return;

            let filteredDates = [];

            if (selectedPeriod.endsWith('D')) {
                const count = parseInt(selectedPeriod);
                const startIdx = Math.max(0, targetIdx - count + 1);
                filteredDates = sortedDates.slice(startIdx, targetIdx + 1);
            } else {
                const targetDateObj = new Date(actualDate);
                let startDateObj = new Date(actualDate);

                if (selectedPeriod === '1Y') startDateObj.setFullYear(targetDateObj.getFullYear() - 1);

                filteredDates = sortedDates.filter(dStr => {
                    const dObj = new Date(dStr);
                    return dObj >= startDateObj && dObj <= targetDateObj;
                });

                if (filteredDates.length <= 1) {
                    const startIdx = Math.max(0, targetIdx - 250 + 1);
                    filteredDates = sortedDates.slice(startIdx, targetIdx + 1);
                }
            }

            const shouldGroupWeekly = ['1Y'].includes(selectedPeriod) || filteredDates.length > 150;
            let timelineData = [];

            if (shouldGroupWeekly) {
                const weeklyGroups = {};
                filteredDates.forEach(dStr => {
                    const dObj = new Date(dStr);
                    const day = dObj.getDay();
                    const diff = dObj.getDate() - day;
                    const sundayObj = new Date(dObj.setDate(diff));
                    const weekKey = sundayObj.toISOString().split('T')[0];

                    if (!weeklyGroups[weekKey]) {
                        weeklyGroups[weekKey] = {
                            totalFlow: 0,
                            lastDateStr: dStr
                        };
                    }
                    const flowVal = history[dStr]?.Fund_Flow?.value || 0;
                    weeklyGroups[weekKey].totalFlow += flowVal;
                    if (new Date(dStr) > new Date(weeklyGroups[weekKey].lastDateStr)) {
                        weeklyGroups[weekKey].lastDateStr = dStr;
                    }
                });

                Object.keys(weeklyGroups).sort().forEach(weekKey => {
                    timelineData.push({
                        dateLabel: weeklyGroups[weekKey].lastDateStr,
                        flowValue: weeklyGroups[weekKey].totalFlow
                    });
                });
            } else {
                filteredDates.forEach(dStr => {
                    const flowVal = history[dStr]?.Fund_Flow?.value || 0;
                    timelineData.push({
                        dateLabel: dStr,
                        flowValue: flowVal
                    });
                });
            }

            let cumulative = 0;
            const categories = [];
            const dailyFlows = [];
            const cumulativeFlows = [];
            const priceData = [];

            timelineData.forEach(item => {
                cumulative += item.flowValue;
                categories.push(item.dateLabel);
                dailyFlows.push(item.flowValue);
                cumulativeFlows.push(cumulative);

                const priceVal = history[item.dateLabel]?.ETF_Price?.value || 0;
                priceData.push(priceVal);
            });

            // 상단 서브 타이틀 정보 표시 업데이트 [2]
            const statsEl = document.getElementById('qqq-trend-stats');
            if (statsEl) {
                const dayFlow = history[actualDate]?.Fund_Flow?.value || 0;
                const sign = dayFlow > 0 ? '+' : '';
                const flowClass = dayFlow > 0 ? 'pos' : (dayFlow < 0 ? 'neg' : 'neutral');
                if (currentLang === 'ko') {
                    statsEl.innerHTML = `(당일 유출입: <span class="${flowClass}">${formatDollarWithSignJS(dayFlow)}</span> | 선택기간 누적: <span class="${cumulative > 0 ? 'pos' : (cumulative < 0 ? 'neg' : 'neutral')}">${formatDollarWithSignJS(cumulative)}</span>)`;
                } else {
                    statsEl.innerHTML = `(Daily Flow: <span class="${flowClass}">${formatDollarWithSignJS(dayFlow)}</span> | Cumulative: <span class="${cumulative > 0 ? 'pos' : (cumulative < 0 ? 'neg' : 'neutral')}">${formatDollarWithSignJS(cumulative)}</span>)`;
                }
            }

            renderQqqTrendChart(categories, dailyFlows, cumulativeFlows, priceData, shouldGroupWeekly);
        }

        // QQQ 자금 유출입 변동성 채널 (Z-Score) 계산 및 차트 바인딩 [2]
        function updateQqqZScoreChannelChart() {
            const pickerVal = document.getElementById('date-picker').value;
            const t = i18n[currentLang];
            const channelDom = document.getElementById('qqq-zscore-channel-chart-container');

            if (!channelDom) return;
            if (!qqqZScoreChannelChart) {
                qqqZScoreChannelChart = echarts.init(channelDom);
            }

            if (!pickerVal || !globalQqqMetrics["QQQ"]) return;

            const actualDate = getClosestQqqAvailableDate(pickerVal);
            if (!actualDate) return;

            const history = globalQqqMetrics["QQQ"].history;
            const sortedDates = Object.keys(history).sort();
            const targetIdx = sortedDates.indexOf(actualDate);
            if (targetIdx === -1) return;

            let periodCount = 20;
            if (channelSelectedPeriod === '50D') periodCount = 50;
            else if (channelSelectedPeriod === '100D') periodCount = 100;
            else if (channelSelectedPeriod === '200D') periodCount = 200;
            else if (channelSelectedPeriod === '1Y') periodCount = 250;

            const startIdx = Math.max(0, targetIdx - periodCount + 1);

            const visibleDates = [];
            const actualFlows = [];
            const means = [];
            const zScores = [];
            
            const bands = {
                p2_5: [], p2_0: [], p1_5: [], p1_0: [], p0_5: [],
                m0_5: [], m1_0: [], m1_5: [], m2_0: [], m2_5: []
            };

            for (let i = startIdx; i <= targetIdx; i++) {
                const dateStr = sortedDates[i];
                const windowStart = Math.max(0, i - 19);
                const windowDates = sortedDates.slice(windowStart, i + 1);
                
                const flows = windowDates.map(d => history[d]?.Fund_Flow?.value || 0);
                const mean = flows.reduce((sum, val) => sum + val, 0) / flows.length;
                
                let stdDev = 0;
                if (flows.length > 1) {
                    const variance = flows.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / (flows.length - 1);
                    stdDev = Math.sqrt(variance);
                }
                
                const currentFlow = history[dateStr]?.Fund_Flow?.value || 0;
                const zScore = stdDev === 0 ? 0 : (currentFlow - mean) / stdDev;

                visibleDates.push(dateStr);
                actualFlows.push(currentFlow);
                means.push(mean);
                zScores.push(zScore);

                bands.p2_5.push(mean + 2.5 * stdDev);
                bands.p2_0.push(mean + 2.0 * stdDev);
                bands.p1_5.push(mean + 1.5 * stdDev);
                bands.p1_0.push(mean + 1.0 * stdDev);
                bands.p0_5.push(mean + 0.5 * stdDev);
                bands.m0_5.push(mean - 0.5 * stdDev);
                bands.m1_0.push(mean - 1.0 * stdDev);
                bands.m1_5.push(mean - 1.5 * stdDev);
                bands.m2_0.push(mean - 2.0 * stdDev);
                bands.m2_5.push(mean - 2.5 * stdDev);
            }

            renderQqqZScoreChannelChart(visibleDates, actualFlows, means, zScores, bands);
        }

                        let flowColor = flow >= 0 ? '#00b853' : '#f03b20';

                        let zColor = '#888888';

                        else if (absZ >= 1.0) zColor = z > 0 ? '#8ce6b0' : '#ff9e9e';
                        
                        let zSign = z > 0 ? '+' : '';

                        return `
                            <div style="font-weight:bold; margin-bottom:6px; color:#aaa; border-bottom:1px solid #444; padding-bottom:4px;">${date}</div>
                            <div style="display:flex; justify-content:space-between; gap:20px; margin-bottom:3px;">

                                <span style="color:#bbb;">${t.channel_mean}:</span>
                                <span style="font-weight:bold; color:${meanColor}">${formatDollarWithSignJS(mean)}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; gap:20px;">
                                <span style="color:#bbb;">Z-Score (20D):</span>
                                <span style="font-weight:bold; color:${zColor}">${zSign}${z.toFixed(2)}</span>
                            </div>
                        `;
                    }
                },
                legend: {
                    data: [t.channel_actual, t.channel_mean, '+2.5 Std Dev', '-2.5 Std Dev'],
                    textStyle: { color: '#ccc' },
                    bottom: 5
                },
                grid: {
                    top: 50,
                    bottom: 60,
                    left: '6%',
                    right: '6%'
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLine: { lineStyle: { color: '#444' } },
                    axisLabel: { color: '#aaa', fontSize: 11 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    axisLabel: { 
                        color: '#aaa',
                        formatter: function(value) { return formatValueAxis(value); }
                    },
                    splitLine: { lineStyle: { color: '#2d2d2d' } }
                },
                series: [
                    {
                        name: t.channel_actual,
                        type: 'line',
                        data: actualFlows,
                        showSymbol: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        lineStyle: { color: 'rgba(255, 255, 255, 0.15)', width: 1 }, 
                        itemStyle: {
                            color: function(params) {
                                const z = zScores[params.dataIndex];
                                const absZ = Math.abs(z);
                                if (absZ < 1.0) return '#888888';
                                else if (absZ < 1.5) return z > 0 ? '#8ce6b0' : '#ff9e9e';
                                else if (absZ < 2.5) return z > 0 ? '#00b853' : '#f03b20';
                                else return z > 0 ? '#055a29' : '#a61b0a';
                            }
                        }
                    },
                    {
                        name: t.channel_mean,
                        type: 'line',
                        data: means,
                        smooth: true,
                        symbol: 'none',
                        lineStyle: { width: 2, color: '#ffffff' }
                    },
                    {

                        type: 'line',
                        data: bands.p2_5,

                        symbol: 'none',

                    },
                    {

                        type: 'line',

                        smooth: true,

                    },
                    {

                        type: 'line',

                    },

                    },
                    {

                        type: 'line',

                    },
                    {

                        type: 'line',

                    {

                    {

                ]
            };

            qqqZScoreChannelChart.setOption(option, true);
        }

        // 수급 추세 기간 변경 리스너 등록 [1]
        document.addEventListener('click', function(e) {
            if (e.target && e.target.classList.contains('qqq-period-btn')) {
                document.querySelectorAll('.qqq-period-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                selectedPeriod = e.target.getAttribute('data-period');
                updateQqqTrendChart();
            }
            if (e.target && e.target.classList.contains('qqq-channel-period-btn')) {
                document.querySelectorAll('.qqq-channel-period-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                channelSelectedPeriod = e.target.getAttribute('data-period');
                updateQqqZScoreChannelChart();
            }
        });

        function handleContribSort(key) {
            if (contribSortKey === key) {
                if (contribSortDirection === 'none') {
                    contribSortDirection = 'desc';
                } else if (contribSortDirection === 'desc') {
                    contribSortDirection = 'asc';
                } else {
                    contribSortDirection = 'none';
                    contribSortKey = null;
                }
            } else {
                contribSortKey = key;
                contribSortDirection = 'desc';
            }
            applyContribSortAndRender();
        }

        function applyContribSortAndRender() {
            let listToSort = [...contribDataList];

            if (contribSortKey && contribSortDirection !== 'none') {
                listToSort.sort((a, b) => {
                    let valA = a[contribSortKey] ?? 0;
                    let valB = b[contribSortKey] ?? 0;

                    if (contribSortKey === 'Ticker') {
                        return contribSortDirection === 'asc' 
                            ? valA.localeCompare(valB) 
                            : valB.localeCompare(valA);
                    }
                    return contribSortDirection === 'asc' ? valA - valB : valB - valA;
                });
            } else {
                listToSort = [...contribDefaultList];
            }

            renderTableContribution(listToSort);
            updateContribHeaderArrows();
        }

        function renderTableContribution(data) {
            const tbody = document.getElementById('table-body-contribution');
            tbody.innerHTML = ''; 
            data.forEach(item => {
                const isPos = item['Point Contribution'] >= 0; const changeClass = isPos ? 'pos' : 'neg'; const sign = isPos ? '+' : '';
                tbody.innerHTML += `<tr><td class="bold-white">${item.Ticker}</td><td>$${item['Current Price ($)'].toLocaleString()}</td><td class="${changeClass}">${sign}${item['Change (%)']}%</td><td>${formatMarketCap(item['Market Cap ($)'])}</td><td class="${changeClass}">${sign}${item['Point Contribution']} pt</td></tr>`;
            });
        }

        function getTranslationForHeaderKey(key) {
            const t = i18n[currentLang];
            const mapping = {
                'Ticker': t.col_ticker,
                'Current Price ($)': t.col_price,
                'Change (%)': t.col_change,
                'Market Cap ($)': t.col_mcap,
                'Point Contribution': t.col_contrib,
                'Shares Held': t.col_shares,
                'Shares Change': t.col_shares_change,
                'Shares Change (%)': t.col_shares_change_pct,
                'Weight (%)': t.col_weight
            };
            return (mapping[key] || key);
        }

        function updateContribHeaderArrows() {
            const headers = document.querySelectorAll('#contribTableHeadRow th.sortable');
            headers.forEach(th => {
                const key = th.getAttribute('data-sort');
                if (!key) return;
                
                let baseText = getTranslationForHeaderKey(key);
                
                if (contribSortKey === key) {
                    if (contribSortDirection === 'asc') {
                        th.innerText = baseText + ' ▲';
                        th.style.color = '#f03b20';
                    } else if (contribSortDirection === 'desc') {
                        th.innerText = baseText + ' ▼';
                        th.style.color = '#00b853';
                    } else {
                        th.innerText = baseText + ' ⇅';
                        th.style.color = '#aaaaaa';
                    }
                } else {
                    th.innerText = baseText + ' ⇅';
                    th.style.color = '#aaaaaa';
                }
            });
        }

        function handleFlowSort(key) {
            if (flowSortKey === key) {
                if (flowSortDirection === 'none') {
                    flowSortDirection = 'desc';
                } else if (flowSortDirection === 'desc') {
                    flowSortDirection = 'asc';
                } else {
                    flowSortDirection = 'none';
                    flowSortKey = null;
                }
            } else {
                flowSortKey = key;
                flowSortDirection = 'desc';
            }
            applyFlowSortAndRender();
        }

        function applyFlowSortAndRender() {
            let listToSort = [...flowDataList];

            if (flowSortKey && flowSortDirection !== 'none') {
                listToSort.sort((a, b) => {
                    let valA = a[flowSortKey] ?? 0;
                    let valB = b[flowSortKey] ?? 0;

                    if (flowSortKey === 'Ticker') {
                        return flowSortDirection === 'asc' 
                            ? valA.localeCompare(valB) 
                            : valB.localeCompare(valA);
                    }
                    return flowSortDirection === 'asc' ? valA - valB : valB - valA;
                });
            } else {
                listToSort = [...flowDefaultList];
            }

            renderTableFlow(listToSort);
            updateFlowHeaderArrows();
        }

        function renderTableFlow(data) {
            const tbody = document.getElementById('table-body-flow');
            const t = i18n[currentLang];
            tbody.innerHTML = ''; 
            data.forEach(item => {
                let changeClass = ''; let sign = '';
                if (item['Shares Change'] > 0) { changeClass = 'pos'; sign = '+'; } else if (item['Shares Change'] < 0) { changeClass = 'neg'; sign = ''; }
                const weight = item['Weight (%)'] ? item['Weight (%)'].toFixed(2) + '%' : 'N/A';
                tbody.innerHTML += `<tr><td class="bold-white">${item.Ticker}</td><td>${item['Shares Held'].toLocaleString()}${t.shares_unit}</td><td class="${changeClass}">${sign}${item['Shares Change'].toLocaleString()}</td><td class="${changeClass}">${sign}${item['Shares Change (%)']}%</td><td style="font-weight:bold; color:#00b853;">${weight}</td></tr>`;
            });
        }

        function updateFlowHeaderArrows() {
            const headers = document.querySelectorAll('#flowTableHeadRow th.sortable');
            headers.forEach(th => {
                const key = th.getAttribute('data-sort');
                if (!key) return;
                
                let baseText = getTranslationForHeaderKey(key);
                
                if (flowSortKey === key) {
                    if (flowSortDirection === 'asc') {
                        th.innerText = baseText + ' ▲';
                        th.style.color = '#f03b20';
                    } else if (flowSortDirection === 'desc') {
                        th.innerText = baseText + ' ▼';
                        th.style.color = '#00b853';
                    } else {
                        th.innerText = baseText + ' ⇅';
                        th.style.color = '#aaaaaa';
                    }
                } else {
                    th.innerText = baseText + ' ⇅';
                    th.style.color = '#aaaaaa';
                }
            });
        }

        // 다국어 상태 전환 함수
        function setLanguage(lang) {
            currentLang = lang;
            
            document.getElementById('lang-ko').classList.toggle('active', lang === 'ko');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.innerText = i18n[lang][key];
                }
            });
            
            document.documentElement.lang = lang;

            if (globalStockData.length > 0) {
                renderNdxSummary();
                renderHeatmap(globalStockData);
                renderWeightDoughnut(globalStockData);
                
                // 다국어 전용 수급 추세 동기화 [1]
                updateQqqTrendChart();
                updateQqqZScoreChannelChart();

                applyContribSortAndRender();
                applyFlowSortAndRender();
            }
        }

        document.querySelectorAll('#contribTableHeadRow th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.getAttribute('data-sort');
                handleContribSort(key);
            });
        });

        document.querySelectorAll('#flowTableHeadRow th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.getAttribute('data-sort');
                handleFlowSort(key);
            });
        });

        window.addEventListener('resize', () => {
            if(myChart) myChart.resize();
            if(weightChart) weightChart.resize();
            // 반응형 리사이징 보완 등록 [1]
            if(qqqTrendChart) qqqTrendChart.resize();
            if(qqqZScoreChannelChart) qqqZScoreChannelChart.resize();
        });
    </script>
