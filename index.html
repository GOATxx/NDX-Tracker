<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나스닥 100 & 자금 흐름 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background-color: #121212; color: white; font-family: sans-serif; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #aaaaaa; z-index: 1000; display: none; }
        
        .tab-container { display: flex; border-bottom: 2px solid #333; margin-bottom: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .tab-button { background: none; border: none; color: #aaaaaa; padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .tab-button:hover { color: white; background-color: #1e1e1e; }
        .tab-button.active { color: #00b853; border-bottom: 3px solid #00b853; }
        
        /* 💡 상단 컨트롤 바 (날짜 선택 + 뱃지) 레이아웃 */
        #top-controls { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        
        /* 💡 새로 추가된 날짜 선택 드롭다운 디자인 */
        #date-selector { padding: 8px 15px; background-color: #1e1e1e; color: #00b853; border: 1px solid #333; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; outline: none; }
        #date-selector:hover { border-color: #00b853; }
        
        #date-info-bar { text-align: right; font-size: 14px; color: #888; }
        .date-badge { display: inline-block; background-color: #1e1e1e; padding: 5px 12px; border-radius: 4px; margin-left: 10px; border: 1px solid #333; }
        .date-badge span { color: #fff; font-weight: bold; margin-left: 5px; }

        .tab-content { display: none; max-width: 1200px; margin: 0 auto; }
        .tab-content.active { display: block; }

        #heatmap-container { width: 100%; height: 50vh; margin-bottom: 20px; }
        
        #ndx-summary { background-color: #1e1e1e; padding: 15px 25px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .summary-title { font-size: 18px; color: #aaaaaa; font-weight: bold; margin-bottom: 5px; }
        .summary-data { font-size: 22px; font-weight: bold; }
        .summary-data span { margin-right: 15px; }
        .summary-details { text-align: right; font-size: 15px; color: #e0e0e0; }
        .summary-error { margin-top: 5px; font-size: 13px; color: #888; }

        h2 { font-size: 20px; margin-bottom: 15px; color: #e0e0e0; }
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; margin-bottom: 50px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #2d2d2d; }
        th { background-color: #2a2a2a; color: #aaaaaa; font-weight: bold; cursor: pointer; user-select: none; }
        th:hover { background-color: #333333; color: white; }
        th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; }
        .pos { color: #00b853; font-weight: bold; }
        .neg { color: #f03b20; font-weight: bold; }
        tr:hover { background-color: #252525; }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중입니다...</div>
    
    <div class="tab-container">
        <button class="tab-button active" onclick="switchTab('tab-contribution')">📈 지수 기여도 히트맵</button>
        <button class="tab-button" onclick="switchTab('tab-flow')">🌊 기관 자금 흐름 (보유 주식 수)</button>
    </div>

    <div id="top-controls">
        <select id="date-selector" onchange="handleDateChange(this.value)">
            <option value="">데이터 목록 로딩 중...</option>
        </select>
        <div id="date-info-bar">데이터 동기화 중...</div>
    </div>

    <div id="tab-contribution" class="tab-content active">
        <div id="heatmap-container"></div>
        <div id="ndx-summary" style="display: none;"></div>
        <h2>종목별 상세 데이터 정보</h2>
        <table id="stock-table">
            <thead>
                <tr>
                    <th onclick="sortTable('Ticker', 'contribution')">티커</th>
                    <th onclick="sortTable('Current Price ($)', 'contribution')">주가</th>
                    <th onclick="sortTable('Change (%)', 'contribution')">변동률</th>
                    <th onclick="sortTable('Market Cap ($)', 'contribution')">시가총액</th>
                    <th onclick="sortTable('Point Contribution', 'contribution')">지수 기여도</th>
                </tr>
            </thead>
            <tbody id="table-body-contribution"></tbody>
        </table>
    </div>

    <div id="tab-flow" class="tab-content">
        <h2>ETF 보유 주식 수 변동 (In-Kind 흐름)</h2>
        <table id="flow-table">
            <thead>
                <tr>
                    <th onclick="sortTable('Ticker', 'flow')">티커</th>
                    <th onclick="sortTable('Shares Held', 'flow')">보유 주식 수</th>
                    <th onclick="sortTable('Shares Change', 'flow')">전일 대비 증감량</th>
                    <th onclick="sortTable('Shares Change (%)', 'flow')">증감률 (%)</th>
                </tr>
            </thead>
            <tbody id="table-body-flow"></tbody>
        </table>
    </div>

    <script>
        // 🚨 주의: 이전에는 latest.json 파일 주소 전체를 넣었지만, 
        // 이번에는 data 폴더까지만 있는 "기본 주소(Base URL)"를 넣어야 합니다!
        // 예시: https://raw.githubusercontent.com/아이디/ndx-tracker/main/data/
        const baseUrl = 'https://raw.githubusercontent.com/GOATxx/NDX-Tracker/refs/heads/main/data/';

        const chartDom = document.getElementById('heatmap-container');
        const myChart = echarts.init(chartDom);
        let globalStockData = []; 
        let currentSortColumn = '';
        let isAscending = true;

        // 💡 1. 페이지가 열리면 메뉴판(available_dates.json)부터 먼저 가져옵니다.
        document.getElementById('loading').style.display = 'block';
        fetch(baseUrl + 'available_dates.json')
            .then(res => res.json())
            .then(dates => {
                const select = document.getElementById('date-selector');
                select.innerHTML = ''; // 기본 글씨 지우기
                
                dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.text = `📅 ${date} 데이터 보기`;
                    select.appendChild(option);
                });

                // 메뉴판을 성공적으로 읽었다면 가장 최신 날짜(첫 번째 배열) 데이터를 화면에 그립니다.
                if (dates.length > 0) {
                    loadData(dates[0]);
                } else {
                    document.getElementById('loading').innerText = '저장된 날짜 데이터가 없습니다.';
                }
            })
            .catch(err => {
                console.error("메뉴판 로딩 실패. latest.json 직접 로딩 시도", err);
                // 만약 메뉴판 파일이 없으면 최후의 보루로 기존 latest.json을 불러옵니다.
                loadData('latest');
            });

        // 💡 2. 사용자가 드롭다운에서 과거 날짜를 클릭하면 실행되는 함수
        function handleDateChange(selectedDate) {
            document.getElementById('loading').style.display = 'block';
            loadData(selectedDate); // 선택된 날짜의 JSON을 불러오라고 지시합니다.
        }

        // 💡 3. 실제 특정 날짜의 JSON 파일을 다운로드하고 화면을 그리는 마법의 함수
        function loadData(dateString) {
            const fetchUrl = `${baseUrl}${dateString}.json`;
            
            fetch(fetchUrl)
                .then(res => res.ok ? res.json() : Promise.reject('데이터 서빙 실패: ' + dateString))
                .then(jsonResponse => {
                    document.getElementById('loading').style.display = 'none';
                    
                    const metadata = jsonResponse.metadata || {};
                    const dataList = jsonResponse.data || jsonResponse;

                    if (metadata.market_date && metadata.invesco_date) {
                        document.getElementById('date-info-bar').innerHTML = `
                            <div class="date-badge">🇺🇸 미국 시장 기준일 <span>${metadata.market_date}</span></div>
                            <div class="date-badge">🏦 Invesco 기준일 <span>${metadata.invesco_date}</span></div>
                        `;
                    }

                    let sumPos = 0; let sumNeg = 0;
                    dataList.forEach(item => {
                        const pt = item['Point Contribution'];
                        if (pt && pt > 0) sumPos += pt;
                        else if (pt && pt < 0) sumNeg += pt;
                    });
                    const calculatedTotal = sumPos + sumNeg;

                    if (metadata.ndx_current_pt) {
                        const ndxPt = metadata.ndx_current_pt;
                        const ndxChg = metadata.ndx_point_change;
                        const ndxPct = metadata.ndx_percent_change;
                        const isPos = ndxChg >= 0;
                        const sign = isPos ? '+' : '';
                        const colorClass = isPos ? 'pos' : 'neg';

                        const errorPt = calculatedTotal - ndxChg;
                        const errorSign = errorPt > 0 ? '+' : '';

                        const summaryDiv = document.getElementById('ndx-summary');
                        summaryDiv.style.display = 'flex';
                        summaryDiv.innerHTML = `
                            <div>
                                <div class="summary-title">NASDAQ 100 Index</div>
                                <div class="summary-data">
                                    <span style="color: white;">${ndxPt.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                    <span class="${colorClass}">${sign}${ndxChg.toFixed(2)} pt</span>
                                    <span class="${colorClass}">(${sign}${ndxPct.toFixed(2)}%)</span>
                                </div>
                            </div>
                            <div class="summary-details">
                                <div>기여도 분해: <span class="pos">+${sumPos.toFixed(2)} pt</span> / <span class="neg">${sumNeg.toFixed(2)} pt</span></div>
                                <div class="summary-error">↳ 계산 합계: ${calculatedTotal > 0 ? '+' : ''}${calculatedTotal.toFixed(2)} pt (오차: ${errorSign}${errorPt.toFixed(2)} pt)</div>
                            </div>
                        `;
                    }

                    globalStockData = dataList.filter(item => item['Point Contribution'] != null);
                    
                    renderHeatmap(globalStockData);
                    renderTableContribution(globalStockData);
                    renderTableFlow(globalStockData);
                })
                .catch(err => {
                    document.getElementById('loading').innerText = '에러 발생: 해당 날짜의 데이터를 찾을 수 없습니다.';
                });
        }

        /* ----- 이하 기존과 동일한 테이블 렌더링/정렬 로직 ----- */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if (tabId === 'tab-contribution' && myChart) myChart.resize();
        }

        function formatMarketCap(mcap) {
            if (!mcap || mcap === 0) return 'N/A';
            return mcap >= 1000000000000 ? `$${(mcap / 1000000000000).toFixed(2)} T` : `$${(mcap / 1000000000).toFixed(2)} B`;
        }

        function getHeatmapColor(changePercent, isPositive) {
            let alpha = 0.25 + (Math.abs(changePercent) / 4) * 0.75;
            if (alpha > 1) alpha = 1.0; 
            return isPositive ? `rgba(0, 184, 83, ${alpha})` : `rgba(240, 59, 32, ${alpha})`;
        }

        function renderHeatmap(data) {
            const treemapData = data.map(item => ({
                name: item.Ticker,
                value: Math.abs(item['Point Contribution']), 
                itemStyle: { color: getHeatmapColor(item['Change (%)'], item['Point Contribution'] >= 0) },
                extraInfo: { change: item['Change (%)'], point: item['Point Contribution'], mcap: item['Market Cap ($)'] }
            }));

            myChart.setOption({
                tooltip: { formatter: d => { if (!d.data || !d.data.extraInfo) return ''; const ext = d.data.extraInfo; return `<div style="font-size: 16px; font-weight: bold; color:#121212;">${d.data.name}</div><span style="color:#121212;">등락률: ${ext.change > 0 ? '+' : ''}${ext.change}%</span><br/><span style="color:#121212;">기여도: ${ext.point > 0 ? '+' : ''}${ext.point} pt</span><br/><span style="color:#121212;">시가총액: ${formatMarketCap(ext.mcap)}</span>`; } },
                series: [{ type: 'treemap', data: treemapData, roam: false, nodeClick: false, breadcrumb: { show: false },
                    label: { show: true, formatter: i => `${i.name}\n${i.data.extraInfo.change > 0 ? '+' : ''}${i.data.extraInfo.change}%\n${i.data.extraInfo.point > 0 ? '+' : ''}${i.data.extraInfo.point}pt`, fontSize: 13, color: '#ffffff' },
                    itemStyle: { borderColor: '#121212', borderWidth: 2 }
                }]
            });
        }

        function renderTableContribution(data) {
            const tbody = document.getElementById('table-body-contribution');
            tbody.innerHTML = ''; 
            data.forEach(item => {
                const isPos = item['Point Contribution'] >= 0; const changeClass = isPos ? 'pos' : 'neg'; const sign = isPos ? '+' : '';
                tbody.innerHTML += `<tr><td>${item.Ticker}</td><td>$${item['Current Price ($)'].toLocaleString()}</td><td class="${changeClass}">${sign}${item['Change (%)']}%</td><td>${formatMarketCap(item['Market Cap ($)'])}</td><td class="${changeClass}">${sign}${item['Point Contribution']} pt</td></tr>`;
            });
        }

        function renderTableFlow(data) {
            const tbody = document.getElementById('table-body-flow');
            tbody.innerHTML = ''; 
            data.forEach(item => {
                let changeClass = ''; let sign = '';
                if (item['Shares Change'] > 0) { changeClass = 'pos'; sign = '+'; } else if (item['Shares Change'] < 0) { changeClass = 'neg'; sign = ''; }
                tbody.innerHTML += `<tr><td>${item.Ticker}</td><td>${item['Shares Held'].toLocaleString()} 주</td><td class="${changeClass}">${sign}${item['Shares Change'].toLocaleString()}</td><td class="${changeClass}">${sign}${item['Shares Change (%)']}%</td></tr>`;
            });
        }

        function sortTable(columnName, tableType) {
            if (currentSortColumn === columnName) isAscending = !isAscending; else { currentSortColumn = columnName; isAscending = true; }
            const headers = document.querySelectorAll(`#tab-${tableType} th`);
            headers.forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.innerText.replace(' ▲','').replace(' ▼','') === getDisplayName(columnName)) th.classList.add(isAscending ? 'sort-asc' : 'sort-desc');
            });
            const sortedData = [...globalStockData].sort((a, b) => {
                let valA = a[columnName] || 0; let valB = b[columnName] || 0;
                if (typeof valA === 'string') return isAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
                return isAscending ? valA - valB : valB - valA;
            });
            if (tableType === 'contribution') renderTableContribution(sortedData); else if (tableType === 'flow') renderTableFlow(sortedData);
        }

        function getDisplayName(col) {
            const names = { 'Ticker':'티커', 'Current Price ($)':'주가', 'Change (%)':'변동률', 'Market Cap ($)':'시가총액', 'Point Contribution':'지수 기여도', 'Shares Held':'보유 주식 수', 'Shares Change':'전일 대비 증감량', 'Shares Change (%)':'증감률 (%)' };
            return names[col] || '';
        }

        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
