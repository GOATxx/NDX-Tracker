name: Daily ETF Data Update

on:
  schedule:
    # 매주 화~토요일 한국시간 오전 10시 (미국장 마감 및 데이터 업데이트 후)
    - cron: "0 1 * * 2-6"
  workflow_dispatch: # 수동으로도 버튼을 눌러 실행할 수 있게 함

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python Script
        run: |
          python XL_tracker.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add XL_metrics.json details/
          git commit -m "Auto-update ETF flow data [skip ci]" || echo "No changes to commit"
          git push
